<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Assignment | Athletic Cloud</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

header{
    background:#111;
    color:white;
    padding:20px 40px;
}

.logo{
    font-size:1.8rem;
    font-weight:bold;
    letter-spacing:2px;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
    margin-bottom:20px;
}

.form-group{
    margin-bottom:20px;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
}

textarea{
    resize:vertical;
}

button{
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    font-weight:bold;
    cursor:pointer;
    padding:12px 18px;
}

button:hover{
    background:#333;
}

.question-card{
    background:#fafafa;
    border:1px solid #eee;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

.question-card h3{
    margin-top:0;
}

.option-box{
    margin-top:10px;
}

.option-input{
    margin-top:8px;
}

.action-row{
    display:flex;
    gap:10px;
    margin-top:20px;
}
.required-row{
    display:flex;
    align-items:center;
    gap:1em;
    margin-top:10px;
    margin-bottom:10px;
}

.question-required{
    width:auto;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        ATHLETIC CLOUD
    </div>
</header>

<div class="container">

    <h1>Create Assignment</h1>

    <div class="form-group">
        <label>Assignment Title</label>
        <input
            type="text"
            id="assignmentTitle"
            placeholder="Enter title"
        >
    </div>

    <div class="form-group">
        <label>Description</label>
        <textarea
            id="assignmentDescription"
            rows="4"
            placeholder="Enter description"
        ></textarea>
    </div>

    <hr>

    <div id="questionContainer"></div>

    <div class="action-row">
        <button id="addQuestionBtn">
            + Add Question
        </button>

        <button id="saveBtn">
            Save Assignment
        </button>
    </div>

</div>

<script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import {
    getAuth
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538",
    storageBucket: "athletic-cloud-33538.firebasestorage.app",
    messagingSenderId: "1020993809301",
    appId: "1:1020993809301:web:a31e28377788bef965249c"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
const auth = getAuth(app);
const teamId =
new URLSearchParams(
    location.search
).get("teamId");

let questionCount = 0;

document
.getElementById("addQuestionBtn")
.addEventListener("click", addQuestion);

function addQuestion(){

    questionCount++;

    const card =
    document.createElement("div");

    card.className =
    "question-card";

    card.innerHTML = `
        <h3>Question ${questionCount}</h3>

        <div class="form-group">
            <input
                type="text"
                class="question-text"
                placeholder="Question Text"
            >
        </div>

        <div class="form-group">
            <select class="question-type">

    <option value="short">
        Short Paragraph
    </option>

    <option value="long">
        Long Paragraph
    </option>

    <option value="multiple">
        Multiple Choice
    </option>

    <option value="checkbox">
        Checkbox
    </option>

    <option value="image">
        Image Upload
    </option>

    <option value="video">
        Video Upload
    </option>

</select>
<label>

        <input
            type="checkbox"
            class="question-required"
        >

        Required

    </label>
        </div>
<div class="required-row">

    <span>Required</span>

    <input
        type="checkbox"
        class="question-required"
    >

</div>
        <div class="option-box"></div>
    `;

    const typeSelect =
    card.querySelector(".question-type");

    const optionBox =
    card.querySelector(".option-box");

    typeSelect.addEventListener("change", () => {

        const type =
        typeSelect.value;

        optionBox.innerHTML = "";

        if(
            type === "multiple" ||
            type === "checkbox"
        ){

            optionBox.innerHTML = `
                <div class="options"></div>

                <button
                    type="button"
                    class="addOptionBtn"
                >
                    + Add Option
                </button>
            `;

            const optionsDiv =
            optionBox.querySelector(".options");

            const addBtn =
            optionBox.querySelector(".addOptionBtn");

            addBtn.addEventListener("click", () => {

                const input =
                document.createElement("input");

                input.type = "text";

                input.placeholder =
                "Option";

                input.className =
                "option-input";

                optionsDiv.appendChild(input);
            });

        }

    });

    document
    .getElementById("questionContainer")
    .appendChild(card);
}

document
.getElementById("saveBtn")
.addEventListener("click", saveAssignment);

    async function saveAssignment(){

    try{

        const title =
        document
        .getElementById("assignmentTitle")
        .value
        .trim();

        const description =
        document
        .getElementById("assignmentDescription")
        .value
        .trim();

        if(!title){

            alert(
                "Title required"
            );

            return;
        }

        const questions = [];

        document
        .querySelectorAll(
            ".question-card"
        )
        .forEach(card => {

            const text =
            card
            .querySelector(
                ".question-text"
            )
            .value
            .trim();

            const type =
            card
            .querySelector(
                ".question-type"
            )
            .value;

            const required =
card.querySelector(
    ".question-required"
).checked;

const question = {

    text,
    type,
    required

};
            if(
                type === "multiple" ||
                type === "checkbox"
            ){

                const options = [];

                card
                .querySelectorAll(
                    ".option-input"
                )
                .forEach(input => {

                    if(
                        input.value.trim()
                    ){

                        options.push(
                            input.value.trim()
                        );

                    }

                });

                question.options =
                options;
            }

            questions.push(
                question
            );
        });

        const user =
        auth.currentUser;

        await addDoc(

            collection(
                db,
                "assignments"
            ),

            {

                title,
                description,

                teamId,

                questions,

                createdBy:
                user.uid,

                createdAt:
                serverTimestamp()

            }

        );

        alert(
            "Assignment Saved"
        );

    }
    catch(err){

        console.error(err);

        alert(
            "Save Failed"
        );
    }
}

</script>

</body>
</html>
