<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Assignment Form | Athletic Cloud</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

header{
    background:#111;
    color:white;
    padding:20px 40px;
}

.logo{
    font-size:1.8rem;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.form-group{ margin-bottom:20px; }

input, textarea, select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    padding:12px 18px;
    cursor:pointer;
}

.question-card{
    background:#fafafa;
    border:1px solid #eee;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}
</style>
</head>

<body>

<header>
    <div class="logo">ATHLETIC CLOUD</div>
</header>

<div class="container">

<h1>Create Assignment Form</h1>

<div class="form-group">
    <input id="formTitle" placeholder="Title">
</div>

<div class="form-group">
    <textarea id="assignmentDescription" placeholder="Description"></textarea>
</div>

<div id="questionContainer"></div>

<button id="addQuestionBtn">+ Add Question</button>
<button id="saveBtn">Save Assignment</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    doc,
    getDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const app = initializeApp({
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538"
});

const db = getFirestore(app);
const auth = getAuth(app);

const teamId = new URLSearchParams(location.search).get("teamId");

let currentUser = null;
let currentRole = null;

/* =========================
   AUTH + ROLE CHECK
========================= */
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        alert("Login required");
        location.href = "login.html";
        return;
    }

    currentUser = user;

    // 🔥 チームロール取得（owner / coach / member）
    const teamSnap = await getDoc(doc(db, "teams", teamId));

    if (!teamSnap.exists()) {
        alert("Team not found");
        return;
    }

    const teamData = teamSnap.data();
    currentRole = teamData.members?.[user.uid];

    // 🔥 権限制御（ここが重要）
    if (currentRole !== "owner" && currentRole !== "coach") {
        alert("Permission denied (owner/coach only)");
        location.href = `team.html?teamId=${teamId}`;
        return;
    }
});

/* =========================
   QUESTION UI
========================= */
document.getElementById("addQuestionBtn").onclick = () => {

    const card = document.createElement("div");
    card.className = "question-card";

    card.innerHTML = `
        <input class="question-text" placeholder="Question">
        <select class="question-type">
            <option value="short">Short</option>
            <option value="long">Long</option>
            <option value="multiple">Multiple</option>
            <option value="checkbox">Checkbox</option>
            <option value="image">Image Upload</option>
            <option value="video">Video Upload</option>
        </select>
        <label>
            Required
            <input type="checkbox" class="question-required">
        </label>
    `;

    document.getElementById("questionContainer").appendChild(card);
};
function addQuestion() {

    const card = document.createElement("div");
    card.className = "question-card";

    card.innerHTML = `
        <input class="question-text" placeholder="Question">

        <select class="question-type">
            <option value="short">Short</option>
            <option value="long">Long</option>
            <option value="multiple">Multiple Choice</option>
            <option value="checkbox">Checkbox</option>
            <option value="image">Image Upload</option>
            <option value="video">Video Upload</option>
        </select>

        <label>
            Required
            <input type="checkbox" class="question-required">
        </label>

        <div class="option-box"></div>
    `;

    const typeSelect = card.querySelector(".question-type");
    const optionBox = card.querySelector(".option-box");

    typeSelect.addEventListener("change", () => {

        optionBox.innerHTML = "";

        if (typeSelect.value === "multiple" || typeSelect.value === "checkbox") {

            optionBox.innerHTML = `
                <div class="options"></div>
                <button type="button" class="addOptionBtn">+ Add Option</button>
            `;

            const optionsDiv = optionBox.querySelector(".options");

            optionBox.querySelector(".addOptionBtn").onclick = () => {

                const input = document.createElement("input");
                input.type = "text";
                input.className = "option-input";
                input.placeholder = "Option";

                optionsDiv.appendChild(input);
            };
        }
    });

    document.getElementById("questionContainer").appendChild(card);
}
/* =========================
   SAVE
========================= */
document.getElementById("saveBtn").onclick = async () => {

    if (!currentUser) return;

    const title = document.getElementById("formTitle").value.trim();
    const description = document.getElementById("assignmentDescription").value.trim();

    if (!title) {
        alert("Title required");
        return;
    }

    const questions = [];

document.querySelectorAll(".question-card").forEach(card => {

    const text = card.querySelector(".question-text").value.trim();
    const type = card.querySelector(".question-type").value;
    const required = card.querySelector(".question-required").checked;

    const question = {
        text,
        type,
        required
    };

    // 🔥 ここが重要
    if (type === "multiple" || type === "checkbox") {

        const options = [];

        card.querySelectorAll(".option-input").forEach(input => {
            const val = input.value.trim();
            if (val) options.push(val);
        });

        question.options = options;
    }

    questions.push(question);
});

    const assignmentData = {
        title,
        description,
        teamId,

        // 🔥 統一スキーマ
        ownerUid: currentUser.uid,
        createdBy: currentUser.uid,

        questions,
        createdAt: serverTimestamp()
    };

    try {

        await addDoc(collection(db, "assignments"), assignmentData);

        alert("Assignment created");

        document.getElementById("questionContainer").innerHTML = "";

    } catch (e) {
        console.error(e);
        alert("Save failed");
    }
};

</script>

</body>
</html>
