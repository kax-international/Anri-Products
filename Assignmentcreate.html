<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Assignment Form| Athletic Cloud</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

header{
    background:#111;
    color:white;
    padding:20px 40px;
}

.logo{
    font-size:1.8rem;
    font-weight:bold;
    letter-spacing:2px;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
    margin-bottom:20px;
}

.form-group{
    margin-bottom:20px;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
}

textarea{
    resize:vertical;
}

button{
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    font-weight:bold;
    cursor:pointer;
    padding:12px 18px;
}

button:hover{
    background:#333;
}

.question-card{
    background:#fafafa;
    border:1px solid #eee;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

.question-card h3{
    margin-top:0;
}

.option-box{
    margin-top:10px;
}

.option-input{
    margin-top:8px;
}

.action-row{
    display:flex;
    gap:10px;
    margin-top:20px;
}
.required-row{
    display:flex;
    align-items:center;
    gap:1em;
    margin-top:10px;
    margin-bottom:10px;
}

.question-required{
    width:auto;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        ATHLETIC CLOUD
    </div>
</header>

<div class="container">

    <h1>Create Assignment Form</h1>

    <div class="form-group">
        <label>Form Title</label>
        <input
            type="text"
            id="formTitle"
            placeholder="Enter title"
        >
    </div>

    <div class="form-group">
        <label>Description</label>
        <textarea
            id="assignmentDescription"
            rows="4"
            placeholder="Enter description"
        ></textarea>
    </div>

    <hr>

    <div id="questionContainer"></div>

    <div class="action-row">
        <button id="addQuestionBtn">
            + Add Question
        </button>

        <button id="saveBtn">
            Save Assignment
        </button>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const teamId = new URLSearchParams(location.search).get("teamId");

let currentUser = null;

/* =========================
   AUTH
========================= */
onAuthStateChanged(auth, (user) => {
    if (!user) {
        alert("Login required");
        location.href = "login.html";
        return;
    }
    currentUser = user;
});

/* =========================
   QUESTION UI
========================= */
let questionCount = 0;

document.getElementById("addQuestionBtn").addEventListener("click", addQuestion);

function addQuestion() {

    questionCount++;

    const card = document.createElement("div");
    card.className = "question-card";

    card.innerHTML = `
        <h3>Question ${questionCount}</h3>

        <input type="text" class="question-text" placeholder="Question Text">

        <select class="question-type">
            <option value="short">Short</option>
            <option value="long">Long</option>
            <option value="multiple">Multiple Choice</option>
            <option value="checkbox">Checkbox</option>
            <option value="image">Image Upload</option>
            <option value="video">Video Upload</option>
        </select>

        <label>
            Required
            <input type="checkbox" class="question-required">
        </label>

        <div class="option-box"></div>
    `;

    const typeSelect = card.querySelector(".question-type");
    const optionBox = card.querySelector(".option-box");

    typeSelect.addEventListener("change", () => {

        optionBox.innerHTML = "";

        if (typeSelect.value === "multiple" || typeSelect.value === "checkbox") {

            optionBox.innerHTML = `
                <div class="options"></div>
                <button type="button" class="addOptionBtn">+ Add Option</button>
            `;

            const optionsDiv = optionBox.querySelector(".options");

            optionBox.querySelector(".addOptionBtn").onclick = () => {
                const input = document.createElement("input");
                input.type = "text";
                input.className = "option-input";
                optionsDiv.appendChild(input);
            };
        }
    });

    document.getElementById("questionContainer").appendChild(card);
}

/* =========================
   SAVE TO FIRESTORE
========================= */
document.getElementById("saveBtn").addEventListener("click", saveAssignment);

async function saveAssignment() {

    if (!currentUser) return;

    const title = document.getElementById("formTitle").value.trim();
    const description = document.getElementById("assignmentDescription").value.trim();

    if (!title) {
        alert("Title required");
        return;
    }

    const questions = [];

    document.querySelectorAll(".question-card").forEach(card => {

        const text = card.querySelector(".question-text")?.value?.trim() || "";
        const type = card.querySelector(".question-type")?.value || "short";
        const required = card.querySelector(".question-required")?.checked || false;

        const question = {
            text,
            type,
            required
        };

        if (type === "multiple" || type === "checkbox") {
            const options = [];
            card.querySelectorAll(".option-input").forEach(i => {
                const v = i.value.trim();
                if (v) options.push(v);
            });
            question.options = options;
        }

        questions.push(question);
    });

    /* =========================
       FIRESTORE DATA SCHEMA（固定）
    ========================= */
    const assignmentData = {
        title,
        description,

        teamId,

        // 🔥 絶対必須（他全部の基準）
        ownerUid: currentUser.uid,
        createdBy: currentUser.uid,

        questions,

        createdAt: serverTimestamp()
    };

    try {

        await addDoc(collection(db, "assignments"), assignmentData);

        alert("Assignment Created");

        // reset optional
        document.getElementById("questionContainer").innerHTML = "";

    } catch (e) {
        console.error(e);
        alert("Save Failed");
    }
}
</script>

</body>
</html>
