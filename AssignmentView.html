<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assignment Forms | Athletic Cloud</title>

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

header{
    background:#111;
    color:white;
    padding:20px 40px;
}

.logo{
    font-size:1.8rem;
    font-weight:bold;
    letter-spacing:2px;
}

.container{
    max-width:1000px;
    margin:40px auto;
    padding:0 20px;
}

h1{
    margin-bottom:20px;
}

#formList{
    display:grid;
    gap:15px;
}

.form-card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    cursor:pointer;
    transition:.2s;
}

.form-card:hover{
    transform:translateY(-3px);
}

.form-title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

.form-description{
    color:#666;
    font-size:14px;
}

.empty{
    background:white;
    padding:20px;
    border-radius:12px;
}

</style>
</head>

<body>

<header>
    <div class="logo">
        ATHLETIC CLOUD
    </div>
</header>

<div class="container">

    <h1>Available Forms</h1>

    <div id="formList">
        Loading...
    </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    query,
    where
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538",
    storageBucket: "athletic-cloud-33538.firebasestorage.app",
    messagingSenderId: "1020993809301",
    appId: "1:1020993809301:web:a31e28377788bef965249c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const teamId =
new URLSearchParams(location.search)
.get("teamId");

loadForms();

async function loadForms(){

    const formList =
    document.getElementById("formList");

    formList.innerHTML = "";

    try{

        const q =
        query(
            collection(db,"assignments"),
            where("teamId","==",teamId)
        );

        const snapshot =
        await getDocs(q);

        if(snapshot.empty){

            formList.innerHTML =
            `
            <div class="empty">
                No Forms Found
            </div>
            `;

            return;
        }

        snapshot.forEach(docSnap => {

            const form =
            docSnap.data();

            const card =
            document.createElement("div");

            card.className =
            "form-card";

            card.innerHTML =
            `
            <div class="form-title">
                ${form.title}
            </div>

            <div class="form-description">
                ${form.description || ""}
            </div>
            `;

            card.addEventListener(
                "click",
                () => {

                    // 次の段階で実装
                    console.log(
                        "Selected Form:",
                        docSnap.id
                    );

                }
            );

            formList.appendChild(card);

        });

    }
    catch(err){

        console.error(err);

        formList.innerHTML =
        `
        <div class="empty">
            Load Failed
        </div>
        `;
    }
}

</script>

</body>
</html>
