<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assignment View | Athletic Cloud</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

header{
    background:#111;
    color:white;
    padding:20px 40px;
}

.logo{
    font-size:1.8rem;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.question-card{
    background:#fafafa;
    border:1px solid #eee;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

.question-title{
    font-weight:bold;
    margin-bottom:10px;
}

.required{
    color:red;
    margin-left:5px;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
}

textarea{
    resize:vertical;
}

button{
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    font-weight:bold;
    cursor:pointer;
    padding:12px 18px;
}

button:hover{
    background:#333;
}

.loading{
    text-align:center;
    color:#666;
}
</style>
</head>

<body>

<header>
    <div class="logo" id="homeLogo">
        ATHLETIC CLOUD
    </div>
</header>

<div class="container">

    <h1 id="assignmentTitle">
        Loading...
    </h1>

    <p id="assignmentDescription"></p>

    <hr>

    <div id="questionContainer" class="loading">
        Loading Questions...
    </div>

    <br>

    <button id="submitBtn">
        Submit Answers
    </button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
    getFirestore,
    doc,
    getDoc
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538",
    storageBucket: "athletic-cloud-33538.firebasestorage.app",
    messagingSenderId: "1020993809301",
    appId: "1:1020993809301:web:a31e28377788bef965249c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const assignmentId =
new URLSearchParams(location.search)
.get("assignmentId");

async function loadAssignment(){

    try{

        const assignmentRef =
        doc(
            db,
            "assignments",
            assignmentId
        );

        const snap =
        await getDoc(
            assignmentRef
        );

        if(!snap.exists()){

            document
            .getElementById(
                "questionContainer"
            )
            .innerHTML =
            "Assignment Not Found";

            return;
        }

        const data =
        snap.data();

        document
        .getElementById(
            "assignmentTitle"
        )
        .textContent =
        data.title;

        document
        .getElementById(
            "assignmentDescription"
        )
        .textContent =
        data.description || "";

        const container =
        document
        .getElementById(
            "questionContainer"
        );

        container.innerHTML = "";

        data.questions.forEach(
            (question,index) => {

            const card =
            document.createElement("div");

            card.className =
            "question-card";

            let html = `
                <div class="question-title">
                    ${index+1}.
                    ${question.text}
                    ${
                        question.required
                        ? '<span class="required">*</span>'
                        : ''
                    }
                </div>
            `;

            if(
                question.type === "short"
            ){

                html += `
                    <input
                        type="text"
                    >
                `;
            }

            else if(
                question.type === "long"
            ){

                html += `
                    <textarea
                        rows="5"
                    ></textarea>
                `;
            }

            else if(
                question.type === "multiple"
            ){

                question.options.forEach(
                    option => {

                    html += `
                        <label>
                            <input
                                type="radio"
                                name="q${index}"
                                value="${option}"
                            >
                            ${option}
                        </label>
                        <br>
                    `;
                });
            }

            else if(
                question.type === "checkbox"
            ){

                question.options.forEach(
                    option => {

                    html += `
                        <label>
                            <input
                                type="checkbox"
                                value="${option}"
                            >
                            ${option}
                        </label>
                        <br>
                    `;
                });
            }

            else if(
                question.type === "image"
            ){

                html += `
                    <input
                        type="file"
                        accept="image/*"
                    >
                `;
            }

            else if(
                question.type === "video"
            ){

                html += `
                    <input
                        type="file"
                        accept="video/*"
                    >
                `;
            }

            card.innerHTML = html;

            container.appendChild(
                card
            );
        });

    }
    catch(err){

        console.error(err);

        document
        .getElementById(
            "questionContainer"
        )
        .innerHTML =
        "Load Failed";
    }
}

document
.getElementById("submitBtn")
.addEventListener("click", () => {

    alert(
        "回答保存機能は次のステップで実装"
    );

});

loadAssignment();

</script>

</body>
</html>
