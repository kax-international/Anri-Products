<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Input Form | Athletic Cloud</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

header{
    background:#111;
    color:white;
    padding:20px 40px;
}

.logo{
    font-size:1.8rem;
    font-weight:bold;
    letter-spacing:2px;
}

.container{
    max-width:900px;
    margin:40px auto;
    padding:30px;
}

.assignment-card{
    background:white;
    padding:20px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    cursor:pointer;
    transition:.2s;
}

.assignment-card:hover{
    transform:translateY(-2px);
}

.assignment-card h3{
    margin-top:0;
}

.back-btn{
    margin-bottom:20px;
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    padding:10px 15px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        ATHLETIC CLOUD
    </div>
</header>

<div class="container">

    <button
        class="back-btn"
        onclick="history.back()">
        ← Back
    </button>

    <h1>Input Form</h1>

    <div id="assignmentList">
        Loading...
    </div>

</div>

<script type="module">
import {
    getAuth,
    onAuthStateChanged
}
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {

    console.log("USER:", user);

    if(!user){

        alert("Not Logged In");
        return;
    }

});
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538",
    storageBucket: "athletic-cloud-33538.firebasestorage.app",
    messagingSenderId: "1020993809301",
    appId: "1:1020993809301:web:a31e28377788bef965249c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const teamId =
new URLSearchParams(
    location.search
).get("teamId");

async function loadAssignments(){

    console.log("Loading assignments...");

    const list =
    document.getElementById(
        "assignmentList"
    );

    list.innerHTML = "";

}
    const snapshot =
    await getDocs(
        collection(
            db,
            "assignments"
        )
    );

    let found = false;

    snapshot.forEach(docSnap => {

        const data =
        docSnap.data();

        if(
            data.teamId !== teamId
        ){
            return;
        }

        found = true;

        const card =
        document.createElement("div");

        card.className =
        "assignment-card";

        card.innerHTML = `
            <h3>${data.title}</h3>
            <p>${data.description || ""}</p>
            <small>
                ${data.questions?.length || 0}
                Questions
            </small>
        `;

        card.addEventListener(
            "click",
            () => {

                window.location.href =
                `AssignmentInput.html?id=${docSnap.id}&teamId=${teamId}`;

            }
        );

        list.appendChild(card);

    });

    if(!found){

        list.innerHTML =
        "<p>No Forms Found</p>";

    }

</script>

</body>
</html>
