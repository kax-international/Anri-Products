<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Input Form | Athletic Cloud</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

header{
    background:#111;
    color:white;
    padding:20px 40px;
}

.logo{
    font-size:1.8rem;
    font-weight:bold;
    letter-spacing:2px;
}

.container{
    max-width:900px;
    margin:40px auto;
    padding:30px;
}

.assignment-card{
    background:white;
    padding:20px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:.2s;
}

.assignment-card:hover{
    transform:translateY(-2px);
}

.assignment-card h3{
    margin:0;
}

.left{
    display:flex;
    flex-direction:column;
}

.right button{
    border:none;
    border-radius:8px;
    padding:10px 14px;
    cursor:pointer;
}

.request-btn{
    background:#111;
    color:white;
}

.requested-btn{
    background:#aaa;
    color:white;
    cursor:not-allowed;
}

.open-btn{
    background:#2d7ef7;
    color:white;
}

.back-btn{
    margin-bottom:20px;
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    padding:10px 15px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <div class="logo">ATHLETIC CLOUD</div>
</header>

<div class="container">

    <button class="back-btn" onclick="history.back()">← Back</button>

    <h1>Input Form</h1>

    <div id="assignmentList">Loading...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    doc,
    getDoc,
    setDoc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const teamId = new URLSearchParams(location.search).get("teamId");

let currentUser = null;

/* =========================
   AUTH
========================= */
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        location.href = "login.html";
        return;
    }

    currentUser = user;
    loadAssignments();
});

/* =========================
   REQUEST STATUS
========================= */
async function getMyRequestStatus(assignmentId) {

    const ref = doc(
        db,
        "featureRequests",
        `${assignmentId}_${currentUser.uid}`
    );

    const snap = await getDoc(ref);

    if (!snap.exists()) return "none";

    return snap.data().status;
}

/* =========================
   SEND REQUEST（ここが本体）
========================= */
async function sendRequest(assignmentId) {

    const assignmentRef = doc(db, "assignments", assignmentId);
    const assignmentSnap = await getDoc(assignmentRef);

    const data = assignmentSnap.data();

    // 🔥 teamNameをteamsから取得（ここが重要）
    const teamRef = doc(db, "teams", data.teamId);
    const teamSnap = await getDoc(teamRef);

    let teamName = "";

    if (teamSnap.exists()) {
        teamName = teamSnap.data().name || "";
    }

    const ref = doc(
        db,
        "featureRequests",
        `${assignmentId}_${currentUser.uid}`
    );

    await setDoc(ref, {
        requesterUid: currentUser.uid,
        requesterName: currentUser.displayName || currentUser.email || "Unknown",

        ownerUid: data.ownerUid || null,

        teamId: data.teamId || "",
        teamName: teamName,   // ← ★ここで確実に入る

        featureType: "inputForm",
        assignmentId,
        assignmentTitle: data.title || "",

        status: "pending",
        createdAt: Date.now()
    });

    await loadAssignments();
}

/* =========================
   LOAD
========================= */
async function loadAssignments() {

    const list = document.getElementById("assignmentList");
    list.innerHTML = "";

    const snapshot = await getDocs(collection(db, "assignments"));

    let found = false;

    for (const docSnap of snapshot.docs) {

        const data = docSnap.data();

        if (data.teamId !== teamId) continue;

        found = true;

        const status = await getMyRequestStatus(docSnap.id);

        let buttonHTML = "";

        if (status === "none" || status === "rejected") {
            buttonHTML = `
                <button class="request-btn"
                    onclick="window.requestForm('${docSnap.id}')">
                    Request
                </button>
            `;
        }

        if (status === "pending") {
            buttonHTML = `
                <button class="requested-btn" disabled>
                    Requested
                </button>
            `;
        }

        if (status === "approved") {
            buttonHTML = `
                <button class="open-btn"
                    onclick="window.openForm('${docSnap.id}')">
                    Open
                </button>
            `;
        }

        const card = document.createElement("div");
        card.className = "assignment-card";

        card.innerHTML = `
            <div class="left">
                <h3>${data.title}</h3>
                <p>${data.description || ""}</p>
            </div>
            <div class="right">
                ${buttonHTML}
            </div>
        `;

        list.appendChild(card);
    }

    if (!found) {
        list.innerHTML = "<p>No Forms Found</p>";
    }
}

/* =========================
   GLOBAL
========================= */
window.requestForm = async (id) => {
    await sendRequest(id);
};

window.openForm = (id) => {
    location.href = `AssignmentInput.html?id=${id}&teamId=${teamId}`;
};

</script>

</body>
</html>
