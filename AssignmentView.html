<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assignment View | Athletic Cloud</title>

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

header{
    background:#111;
    color:white;
    padding:20px 40px;
}

.logo{
    font-size:1.8rem;
    font-weight:bold;
    letter-spacing:2px;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.question-card{
    background:#fafafa;
    border:1px solid #eee;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

.question-title{
    font-weight:bold;
    margin-bottom:10px;
}

.option-row{
    margin-top:8px;
}

input[type=text],
textarea,
select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    box-sizing:border-box;
}

textarea{
    resize:vertical;
}

button{
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    padding:12px 18px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#333;
}

</style>
</head>

<body>

<header>
    <div class="logo">
        ATHLETIC CLOUD
    </div>
</header>

<div class="container">

    <h1 id="assignmentTitle">
        Loading...
    </h1>

    <p id="assignmentDescription"></p>

    <hr>

    <div id="formContainer"></div>

    <button id="saveBtn">
        Save Entry
    </button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
    getFirestore,
    doc,
    getDoc,
    collection,
    addDoc,
    serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {

    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538",
    storageBucket: "athletic-cloud-33538.firebasestorage.app",
    messagingSenderId: "1020993809301",
    appId: "1:1020993809301:web:a31e28377788bef965249c"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
const auth = getAuth(app);

const assignmentId =
new URLSearchParams(location.search)
.get("assignmentId");

let assignmentData = null;

async function loadAssignment(){

    try{

        const ref =
        doc(
            db,
            "assignments",
            assignmentId
        );

        const snap =
        await getDoc(ref);

        if(!snap.exists()){

            alert(
                "Assignment not found"
            );

            return;
        }

        assignmentData =
        snap.data();

        document
        .getElementById(
            "assignmentTitle"
        )
        .textContent =
        assignmentData.title;

        document
        .getElementById(
            "assignmentDescription"
        )
        .textContent =
        assignmentData.description || "";

        renderQuestions();

    }
    catch(err){

        console.error(err);

        alert(
            "Load Failed"
        );

    }

}

function renderQuestions(){

    const container =
    document.getElementById(
        "formContainer"
    );

    container.innerHTML = "";

    assignmentData.questions
    .forEach((question,index) => {

        const card =
        document.createElement("div");

        card.className =
        "question-card";

        let html = `

            <div class="question-title">

                ${question.text}

                ${question.required
                    ? "*"
                    : ""}

            </div>

        `;

        if(question.type === "short"){

            html += `
                <input
                    type="text"
                    data-question="${index}"
                >
            `;
        }

        else if(
            question.type === "long"
        ){

            html += `
                <textarea
                    rows="4"
                    data-question="${index}"
                ></textarea>
            `;
        }

        else if(
            question.type === "multiple"
        ){

            html += `
                <select
                    data-question="${index}"
                >
            `;

            question.options
            .forEach(option => {

                html += `
                    <option>
                        ${option}
                    </option>
                `;

            });

            html += `
                </select>
            `;
        }

        else if(
            question.type === "checkbox"
        ){

            question.options
            .forEach(option => {

                html += `
                    <div class="option-row">

                        <label>

                            <input
                                type="checkbox"
                                value="${option}"
                                data-question="${index}"
                            >

                            ${option}

                        </label>

                    </div>
                `;

            });

        }

        card.innerHTML = html;

        container.appendChild(card);

    });

}

document
.getElementById("saveBtn")
.addEventListener("click", saveEntry);

async function saveEntry(){

    try{

        const answers = {};

        assignmentData.questions
        .forEach((question,index) => {

            if(
                question.type === "checkbox"
            ){

                const selected = [];

                document
                .querySelectorAll(
                    `input[data-question="${index}"]:checked`
                )
                .forEach(box => {

                    selected.push(
                        box.value
                    );

                });

                answers[
                    question.text
                ] = selected;

            }

            else{

                const field =
                document.querySelector(
                    `[data-question="${index}"]`
                );

                answers[
                    question.text
                ] = field.value;

            }

        });

        await addDoc(

            collection(
                db,
                "assignmentEntries"
            ),

            {

                assignmentId,

                answers,

                createdBy:
                auth.currentUser.uid,

                createdAt:
                serverTimestamp()

            }

        );

        alert(
            "Entry Saved"
        );

    }
    catch(err){

        console.error(err);

        alert(
            "Save Failed"
        );

    }

}

onAuthStateChanged(
    auth,
    user => {

        if(!user){

            location.href =
            "login.html";

            return;
        }

        loadAssignment();

    }
);

</script>

</body>
</html>
