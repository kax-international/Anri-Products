<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Team | Athletic Cloud</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial,sans-serif;

    background:
    linear-gradient(
        rgba(0,0,0,.55),
        rgba(0,0,0,.55)
    ),
    url("IMG_3359.jpeg");

    background-size:cover;
    background-position:center;
}

.create-container{

    width:100%;
    max-width:450px;

    background:white;

    padding:50px;

    border-radius:20px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.25);
}

.logo{

    text-align:center;

    font-size:2rem;

    font-weight:bold;

    letter-spacing:2px;

    margin-bottom:10px;

    color:#111;
}

.subtitle{

    text-align:center;

    color:#666;

    margin-bottom:35px;
}

.input-group{

    margin-bottom:20px;
}

.input-group label{

    display:block;

    margin-bottom:8px;

    font-weight:bold;

    color:#333;
}

.input-group input{

    width:100%;

    padding:14px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:1rem;
}

.input-group input:focus{

    outline:none;

    border-color:#111;
}

.create-btn{

    width:100%;

    padding:15px;

    border:none;

    border-radius:8px;

    background:#111;

    color:white;

    font-size:1rem;

    font-weight:bold;

    cursor:pointer;

    transition:.3s;
}

.create-btn:hover{

    background:#333;
}

.message{

    margin-top:15px;
    text-align:center;
    font-size:.95rem;
}

.success{
    color:green;
}

.error{
    color:red;
}

</style>

</head>

<body>

<div class="create-container">

    <div class="logo">
        ATHLETIC CLOUD
    </div>

    <div class="subtitle">
        Create a new team
    </div>

    <form id="createTeamForm">

        <div class="input-group">
            <label>Team Name</label>

            <input
                type="text"
                id="teamName"
                placeholder="Enter team name"
                required
            >
        </div>

        <button
            type="submit"
            class="create-btn">
            Create Team
        </button>

    </form>

    <div id="message" class="message"></div>

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
  authDomain: "athletic-cloud-33538.firebaseapp.com",
  projectId: "athletic-cloud-33538"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

/* =========================
   AUTH
========================= */
onAuthStateChanged(auth, (user) => {
    currentUser = user;
});

/* =========================
   CREATE TEAM
========================= */
document.getElementById("createTeamForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const teamName = document.getElementById("teamName").value.trim();
    const message = document.getElementById("message");

    if (!currentUser) {
        message.textContent = "Need to login";
        message.className = "message error";
        return;
    }

    if (!teamName) {
        message.textContent = "Team name required";
        message.className = "message error";
        return;
    }

    try {

        const teamData = {
            name: teamName,

            // 🔥 統一フィールド（最重要）
            ownerUid: currentUser.uid,
            createdBy: currentUser.uid,

            members: {
                [currentUser.uid]: "owner"
            },

            createdAt: serverTimestamp()
        };

        const teamRef = await addDoc(
            collection(db, "teams"),
            teamData
        );

        message.textContent = "Team Created!";
        message.className = "message success";

        setTimeout(() => {
            window.location.href = `team.html?teamId=${teamRef.id}`;
        }, 500);

    } catch (err) {
        console.error(err);
        message.textContent = "Error creating team";
        message.className = "message error";
    }
});
</script>
</body>
</html>
