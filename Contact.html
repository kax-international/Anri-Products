<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    background:#f5f5f5;
}

.container{
    display:flex;
    min-height:100vh;
}

/* 左側 */
.left{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px;
    background:white;
}

.contact-info{
    max-width:500px;
}

.contact-info h1{
    font-size:3rem;
    margin-bottom:40px;
    color:#111;
}

.contact-item{
    margin-bottom:25px;
}

.contact-item h2{
    font-size:1rem;
    color:#777;
    margin-bottom:8px;
    letter-spacing:1px;
}

.contact-item p{
    font-size:1.2rem;
    color:#111;
}

.home-link{
    display:inline-block;
    margin-top:40px;
    text-decoration:none;
    color:#111;
    font-weight:bold;
}

.home-link:hover{
    opacity:0.7;
}

/* 右側 */
.right{
    width:50%;
}

.right img{
    width:100%;
    height:100vh;
    object-fit:cover;
    display:block;
}

/* スマホ対応 */
@media(max-width:768px){

    .container{
        flex-direction:column;
    }

    .left,
    .right{
        width:100%;
    }

    .right img{
        height:50vh;
    }

    .contact-info h1{
        font-size:2.2rem;
    }

}

</style>

</head>

<body>

<div class="container">

    <div class="left">

        <div class="contact-info">

            <h1>Contact</h1>

            <div class="contact-item">
                <h2>NAME</h2>
                <p>Anri Sato</p>
            </div>

            <div class="contact-item">
                <h2>EMAIL</h2>
                <p>anrisato620@gmail.com</p>
            </div>

            <div class="contact-item">
                <h2>PHONE</h2>
                <p>080-6461-0810</p>
            </div>

            <a href="AthleticCloud.html" class="home-link">
                ← Back to Home
            </a>

        </div>

    </div>

    <div class="right">

        <img
            src="IMG-3221.jpg"
            alt="Profile Image"
        >

    </div>

</div>
