<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Anri Products</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
   body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  background:
    linear-gradient(
      rgba(0,0,0,0.45),
      rgba(0,0,0,0.45)
    ),
    url("IMG_E2598.JPG");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  color: white;
  font-family: Arial, sans-serif;
}

    .container {
      text-align: center;
    }



    h1 {
      font-size: 3.5rem;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    a.button {
      display: block;
      width: 220px;
      padding: 12px;
      margin: 15px auto;
      color: #111;
      background: #fff;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      transition: 0.3s;
    }

    a.button:hover {
      background: #ddd;
      transform: translateY(-2px);
    }

    a.button i {
      margin-right: 8px;
    }

    .contact-button{
    position:fixed;
    top:25px;
    right:30px;

    color:white;
    text-decoration:none;
    font-size:1rem;
    font-weight:600;
    letter-spacing:1px;

    transition:0.3s;
}

.contact-button:hover{
    opacity:0.7;
}
  </style>
</head>
<body>
  <a href="Contact.html" class="contact-button">
    Contact
</a>
  <div class="container">

    <h1>Anri's Products</h1>

    <br>
    <a href="AthleticCloud.html" class="button">
      <i class="fas fa-th-large"></i> Athletic Cloud
    </a>

  </div>
</body>
</html>
