<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Anri Products</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #333, #fff);
      color: #111;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }



    h1 {
      font-size: 3.5rem;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    a.button {
      display: block;
      width: 220px;
      padding: 12px;
      margin: 15px auto;
      color: #111;
      background: #fff;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      transition: 0.3s;
    }

    a.button:hover {
      background: #ddd;
      transform: translateY(-2px);
    }

    a.button i {
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="container">

    <h1>Anri's Products</h1>

    <br>
    <a href="Athletic Cloud.html" class="button">
      <i class="fas fa-th-large"></i> Athletic Cloud
    </a>

  </div>
</body>
</html>
