<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{ margin-bottom:20px; }

.section{ margin-bottom:20px; }

label{
    font-weight:bold;
    display:block;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-bottom:10px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#333;
}

.subtitle-box{
    margin-bottom:10px;
}

.add-btn{
    background:#444;
    margin-bottom:20px;
}

.status{
    font-size:13px;
    color:#666;
}
</style>
</head>

<body>

<div class="container">

<h1>Upload Video </h1>

<!-- Playlist Title -->
<div class="section">
    <label>Playlist Title</label>
    <input id="playlistTitle" placeholder="ex. 2026 season">
</div>

<!-- Subtitles -->
<div class="section">
    <label>Subtitles </label>

    <div id="subtitleContainer">
        <input class="subtitle-box" placeholder="ex. 06232026">
    </div>

    <button class="add-btn" id="addSubtitle">+ Add Subtitle</button>
</div>

<!-- Video -->
<div class="section">
    <label>Videos</label>

    <div id="videoContainer"></div>

    <button id="addVideoBtn" class="add-btn">+ Add Video</button>
</div>

<button id="uploadBtn">Upload</button>

<p class="status" id="status"></p>

</div>

<script type="module">
import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    updateDoc,
    addDoc,
    collection,
    serverTimestamp,
    arrayUnion
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

/* =========================
   CONFIG（ここに統一）
========================= */
const CLOUD_NAME = "dxvgp89ma";
const UPLOAD_PRESET = "AthleticCloud";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538",
    storageBucket: "athletic-cloud-33538.firebasestorage.app",
    messagingSenderId: "1020993809301",
    appId: "1:1020993809301:web:a31e28377788bef965249c"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

let currentUser = null;

/* =========================
   PARAMS
========================= */
const params = new URLSearchParams(location.search);
const teamId = params.get("teamId");
onAuthStateChanged(auth, async (user) => {

    if (!user) {

        location.href = "login.html";
        return;
    }

    currentUser = user;

    try{

        const teamRef =
        doc(db,"teams",teamId);

        const teamSnap =
        await getDoc(teamRef);

        if(!teamSnap.exists()){

            alert("Team not found");

            location.href =
            "dashboard.html";

            return;
        }

        const teamData =
        teamSnap.data();

        const role =
        teamData.members?.[user.uid];

        if(
            role !== "owner" &&
            role !== "coach" &&
            role !== "staff"
        ){

            alert(
                "Permission denied"
            );

            location.href =
            `team.html?teamId=${teamId}`;

            return;
        }

    }
    catch(err){

        console.error(err);

        alert(
            "Permission check failed"
        );

        location.href =
        `team.html?teamId=${teamId}`;
    }
});
/* =========================
   STATUS
========================= */
const status = document.getElementById("status");
function setStatus(msg){
    status.textContent = msg;
}

/* =========================
   ADD VIDEO UI
========================= */
document.getElementById("addVideoBtn").onclick = () => {

    const container =
        document.getElementById(
            "videoContainer"
        );

    const block =
        document.createElement("div");

    block.className =
        "video-block";

    block.innerHTML = `
        <input
            type="file"
            class="video-file"
            accept="video/*">

        <input
            type="text"
            class="video-title"
            placeholder="Video Title">

        <select
            class="playlist-subtitle">
        </select>

        <hr>
    `;

    const select =
        block.querySelector(
            ".playlist-subtitle"
        );

    document
    .querySelectorAll(".subtitle-box")
    .forEach(input => {

        const value =
            input.value.trim();

        if(!value) return;

        const option =
            document.createElement(
                "option"
            );

        option.value = value;
        option.textContent = value;

        select.appendChild(option);

    });

    container.appendChild(block);
};

/* =========================
   ADD SUBTITLE
========================= */
document.getElementById("addSubtitle").onclick = () => {

    const input =
        document.createElement(
            "input"
        );

    input.className =
        "subtitle-box";

    input.placeholder =
        "ex. Quarter back";

    document
    .getElementById(
        "subtitleContainer"
    )
    .appendChild(input);

    document
    .querySelectorAll(
        ".playlist-subtitle"
    )
    .forEach(select => {

        select.innerHTML = "";

        document
        .querySelectorAll(
            ".subtitle-box"
        )
        .forEach(subInput => {

            const value =
                subInput.value.trim();

            if(!value) return;

            const option =
                document.createElement(
                    "option"
                );

            option.value =
                value;

            option.textContent =
                value;

            select.appendChild(
                option
            );
        });
    });
};
/* =========================
   UPLOAD
========================= */
document.getElementById("uploadBtn").onclick = async () => {
if (!currentUser) {
    alert("Please wait until login completes");
    return;
}
    const title = document.getElementById("playlistTitle").value;
    const videoBlocks = document.querySelectorAll(".video-block");

    if(!title){
        alert("Playlist title required");
        return;
    }

    if(videoBlocks.length === 0){
        alert("Add at least one video");
        return;
    }

    setStatus("Uploading...");

    const subtitles = [];
    document.querySelectorAll(".subtitle-box").forEach(el => {
        if(el.value.trim()) subtitles.push(el.value.trim());
    });

    const playlistId = title
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "_");

    try {

    // playlist document
    const playlistRef =
doc(db,"playlists",playlistId);

const playlistSnap =
await getDoc(playlistRef);

if(!playlistSnap.exists()){

    await setDoc(
        playlistRef,
        {
            teamId,

            ownerUid:
                currentUser?.uid || "",

            ownerName:
                currentUser?.displayName ||
                currentUser?.email ||
                "Unknown",

            title,

            subtitles,

            serviceType:
                "video",

            createdAt:
                serverTimestamp()
        }
    );

}else{

    for(const subtitle of subtitles){

        await updateDoc(
            playlistRef,
            {
                subtitles:
                arrayUnion(subtitle)
            }
        );
    }

}

    // videos subcollection
    for(let i = 0; i < videoBlocks.length; i++){

        const block = videoBlocks[i];

        const file =
            block.querySelector(".video-file").files[0];

        const videoTitle =
    block.querySelector(
        ".video-title"
    ).value.trim();

const subtitles =
    block.querySelector(
        ".playlist-subtitle"
    ).value;

        if(!file) continue;

        setStatus(
            `Uploading ${i+1}/${videoBlocks.length}...`
        );
        if(!videoTitle){

    alert(
        `Video ${i+1} needs title`
    );

    return;
}

        // Cloudinary
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);

        const res = await fetch(
            `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`,
            {
                method:"POST",
                body:formData
            }
        );

        const data = await res.json();

        if(!data.secure_url){
            console.error(data);
            throw new Error("Cloudinary upload failed");
        }

        // playlists/{playlistId}/videos
    await addDoc(
    collection(
        db,
        "playlists",
        playlistId,
        "videos"
    ),
    {

        ownerUid:
            currentUser?.uid || "",

        teamId,

        videoTitle:
            videoTitle,

        subtitles:
            subtitles,

        videoUrl:
            data.secure_url,

        thumbnailUrl:
            data.thumbnail_url || "",

        createdAt:
            serverTimestamp()
    }
);
    }
setStatus("All uploads complete!");

    document.getElementById("playlistTitle").value = "";
    document.getElementById("videoContainer").innerHTML = "";
    document.getElementById("subtitleContainer").innerHTML =
        `<input class="subtitle-box" placeholder="ex. 06232026">`;

}
catch(err){

    console.error(err);
    setStatus("Upload failed");

}
       
};

</script>

</body>
</html>
