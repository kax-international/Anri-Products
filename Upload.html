<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{ margin-bottom:20px; }

.section{ margin-bottom:20px; }

label{
    font-weight:bold;
    display:block;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-bottom:10px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#333;
}

.subtitle-box{
    margin-bottom:10px;
}

.add-btn{
    background:#444;
    margin-bottom:20px;
}

.status{
    font-size:13px;
    color:#666;
}
</style>
</head>

<body>

<div class="container">

<h1>Upload Video </h1>

<!-- Playlist Title -->
<div class="section">
    <label>Playlist Title</label>
    <input id="playlistTitle" placeholder="ex. 2026 season">
</div>

<!-- Subtitles -->
<div class="section">
    <label>Subtitles </label>

    <div id="subtitleContainer">
        <input class="subtitle-box" placeholder="ex. 06232026">
    </div>

    <button class="add-btn" id="addSubtitle">+ Add Subtitle</button>
</div>

<!-- Video -->
<div class="section">
    <label>Videos</label>

    <div id="videoContainer"></div>

    <button id="addVideoBtn" class="add-btn">+ Add Video</button>
</div>

<button id="uploadBtn">Upload</button>

<p class="status" id="status"></p>

</div>

<script type="module">
import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
const auth = getAuth(app);

let currentUser = null;
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    doc,
    setDoc,
    addDoc,
    collection,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

/* =========================
   CONFIG（ここに統一）
========================= */
const CLOUD_NAME = "dxvgp89ma";
const UPLOAD_PRESET = "AthleticCloud";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538",
    storageBucket: "athletic-cloud-33538.firebasestorage.app",
    messagingSenderId: "1020993809301",
    appId: "1:1020993809301:web:a31e28377788bef965249c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   PARAMS
========================= */
const params = new URLSearchParams(location.search);
const teamId = params.get("teamId");
onAuthStateChanged(auth, (user) => {

    if (!user) {

        location.href = "login.html";
        return;
    }

    currentUser = user;
});
/* =========================
   STATUS
========================= */
const status = document.getElementById("status");
function setStatus(msg){
    status.textContent = msg;
}

/* =========================
   ADD VIDEO UI
========================= */
document.getElementById("addVideoBtn").onclick = () => {
    const container = document.getElementById("videoContainer");

    const block = document.createElement("div");
    block.className = "video-block";

    block.innerHTML = `
        <input type="file" class="video-file" accept="video/*">
        <input type="text" class="video-subtitle" placeholder="subtitle (optional)">
        <hr>
    `;

    container.appendChild(block);
};

/* =========================
   ADD SUBTITLE
========================= */
document.getElementById("addSubtitle").onclick = () => {
    const input = document.createElement("input");
    input.className = "subtitle-box";
    input.placeholder = "ex. Quarter back";
    document.getElementById("subtitleContainer").appendChild(input);
};

/* =========================
   UPLOAD
========================= */
document.getElementById("uploadBtn").onclick = async () => {

    const title = document.getElementById("playlistTitle").value;
    const videoBlocks = document.querySelectorAll(".video-block");

    if(!title){
        alert("Playlist title required");
        return;
    }

    if(videoBlocks.length === 0){
        alert("Add at least one video");
        return;
    }

    setStatus("Uploading...");

    const subtitles = [];
    document.querySelectorAll(".subtitle-box").forEach(el => {
        if(el.value.trim()) subtitles.push(el.value.trim());
    });

    const playlistId = title
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "_");

    try {

    // playlist document
    const playlistRef = doc(db, "playlists", playlistId);

    await setDoc(playlistRef, {

    teamId,

    ownerUid:
        currentUser?.uid || "",

    ownerName:
        currentUser?.displayName ||
        currentUser?.email ||
        "Unknown",

    title,

    subtitles,

    serviceType:
        "video",

    createdAt:
        serverTimestamp()
});

    // videos subcollection
    for(let i = 0; i < videoBlocks.length; i++){

        const block = videoBlocks[i];

        const file =
            block.querySelector(".video-file").files[0];

        const subtitle =
            block.querySelector(".video-subtitle").value.trim();

        if(!file) continue;

        setStatus(
            `Uploading ${i+1}/${videoBlocks.length}...`
        );

        // Cloudinary
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);

        const res = await fetch(
            `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`,
            {
                method:"POST",
                body:formData
            }
        );

        const data = await res.json();

        if(!data.secure_url){
            console.error(data);
            throw new Error("Cloudinary upload failed");
        }

        // playlists/{playlistId}/videos
        await addDoc(
    collection(
        db,
        "playlists",
        playlistId,
        "videos"
    ),
    {

        ownerUid:
            currentUser?.uid || "",

        teamId,

        videoUrl:
            data.secure_url,

        subtitle:
            subtitle,

        thumbnailUrl:
            data.thumbnail_url || "",

        createdAt:
            serverTimestamp()
    }
);
    }
setStatus("All uploads complete!");

    document.getElementById("playlistTitle").value = "";
    document.getElementById("videoContainer").innerHTML = "";
    document.getElementById("subtitleContainer").innerHTML =
        `<input class="subtitle-box" placeholder="ex. 06232026">`;

}
catch(err){

    console.error(err);
    setStatus("Upload failed");

}
       
};

</script>

</body>
</html>
