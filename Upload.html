<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{ margin-bottom:20px; }

.section{ margin-bottom:20px; }

label{
    font-weight:bold;
    display:block;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    margin-bottom:10px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#333;
}

.subtitle-box{
    margin-bottom:10px;
}

.add-btn{
    background:#444;
    margin-bottom:20px;
}

.status{
    font-size:13px;
    color:#666;
}
</style>
</head>

<body>

<div class="container">

<h1>Upload Video (Hudl Style)</h1>

<!-- Playlist Title -->
<div class="section">
    <label>Playlist Title</label>
    <input id="playlistTitle" placeholder="ex. 2026 season">
</div>

<!-- Subtitles -->
<div class="section">
    <label>Subtitles </label>

    <div id="subtitleContainer">
        <input class="subtitle-box" placeholder="ex. 06232026">
    </div>

    <button class="add-btn" id="addSubtitle">+ Add Subtitle</button>
</div>

<!-- Video -->
<div class="section">
    <label>Videos</label>

    <div id="videoContainer"></div>

    <button id="addVideoBtn" class="add-btn">+ Add Video</button>
</div>

<button id="uploadBtn">Upload</button>

<p class="status" id="status"></p>

</div>

<script type="module">
document.getElementById("addVideoBtn").onclick = () => {

    const container = document.getElementById("videoContainer");

    const block = document.createElement("div");
    block.className = "video-block";

    block.innerHTML = `
        <input type="file" class="video-file" accept="video/*">
        <input type="text" class="video-subtitle" placeholder="subtitle (optional)">
        <hr>
    `;

    container.appendChild(block);
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    doc,
    setDoc,
    addDoc,
    collection,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

/* =========================
   Firebase
========================= */
const firebaseConfig = {
    apiKey: "XXX",
    authDomain: "XXX",
    projectId: "XXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   Cloudinary
========================= */
const CLOUD_NAME = "dxvgp89ma";
const UPLOAD_PRESET = "AthleticCloud";

/* =========================
   URL Params
========================= */
const params = new URLSearchParams(location.search);
const teamId = params.get("teamId");

/* =========================
   UI helpers
========================= */
const status = document.getElementById("status");

function setStatus(msg){
    status.textContent = msg;
}

/* =========================
   Add subtitle input
========================= */
document.getElementById("addSubtitle").onclick = () => {
    const input = document.createElement("input");
    input.className = "subtitle-box";
    input.placeholder = "ex. Quarter back";
    document.getElementById("subtitleContainer").appendChild(input);
};

/* =========================
   Upload process
========================= */
document.getElementById("uploadBtn").onclick = async () => {

    const title = document.getElementById("playlistTitle").value;

    const videoBlocks = document.querySelectorAll(".video-block");

    if(!title){
        alert("Playlist title required");
        return;
    }

    if(!.video-block){
        alert("Video file required");
        return;
    }

    setStatus("Uploading videos...");

    // subtitles
    const subtitleInputs = document.querySelectorAll(".subtitle-box");

    const subtitles = [];
    subtitleInputs.forEach(el => {
        const v = el.value.trim();
        if(v) subtitles.push(v);
    });

    const playlistId = title
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "_");

    try{

        // 1. playlist保存（1回だけ）
        await setDoc(doc(db, "playlists", playlistId), {
            teamId,
            title,
            subtitles,
            createdAt: serverTimestamp()
        });

        // 2. 複数動画を順番にアップロード
        for(let i = 0; i < videoBlocks.length; i++){

    const block = videoBlocks[i];

    const file = block.querySelector(".video-file").files[0];
    const subtitle = block.querySelector(".video-subtitle").value;

    if(!file) continue;

    setStatus(`Uploading ${i+1}/${videoBlocks.length}...`);

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", UPLOAD_PRESET);

    const res = await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`,
        {
            method: "POST",
            body: formData
        }
    );

    const data = await res.json();

    if(!data.secure_url){
        console.error(data);
        throw new Error("Upload failed");
    }

    await addDoc(collection(db, "videos"), {
        teamId,
        playlistId,
        title,
        subtitle: subtitle || "",
        videoUrl: data.secure_url,
        thumbnailUrl: data.thumbnail_url || "",
        createdAt: serverTimestamp()
    });
}

        setStatus("All uploads complete!");

        // reset UI
        document.getElementById("playlistTitle").value = "";
        document.getElementById("subtitleContainer").innerHTML =
            `<input class="subtitle-box" placeholder="ex. 06232026">`;
        fileInput.value = "";

    }catch(err){
        console.error(err);
        setStatus("Upload failed");
    }
};

</script>

</body>
</html>
