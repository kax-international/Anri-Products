<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Input Form | Athletic Cloud</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

header{
    background:#111;
    color:white;
    padding:20px 40px;
}

.logo{
    font-size:1.8rem;
    font-weight:bold;
    letter-spacing:2px;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.question-card{
    margin-bottom:25px;
    padding:20px;
    background:#fafafa;
    border-radius:10px;
    border:1px solid #eee;
}

.question-title{
    font-weight:bold;
    margin-bottom:10px;
}

input,
textarea,
select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
}

button{
    background:#111;
    color:white;
    border:none;
    border-radius:8px;
    padding:12px 20px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#333;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        ATHLETIC CLOUD
    </div>
</header>

<div class="container">

    <h1 id="formTitle">
        Loading...
    </h1>

    <p id="formDescription"></p>

    <div id="questionContainer"></div>

    <br>

    <button id="submitBtn">
        Submit Form
    </button>

</div>

<script type="module">
const CLOUD_NAME = "dxvgp89ma";
const UPLOAD_PRESET = "AthleticCloud";
import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
    getFirestore,
    doc,
    getDoc,
    collection,
    addDoc,
    serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538",
    storageBucket: "athletic-cloud-33538.firebasestorage.app",
    messagingSenderId: "1020993809301",
    appId: "1:1020993809301:web:a31e28377788bef965249c"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
const auth = getAuth(app);

const assignmentId =
new URLSearchParams(location.search)
.get("id");

const teamId =
new URLSearchParams(location.search)
.get("teamId");

let assignmentData = null;

onAuthStateChanged(auth, async(user)=>{

    if(!user){
        location.href = "login.html";
        return;
    }

    await loadAssignment();

});

async function loadAssignment(){

    const snap =
    await getDoc(
        doc(
            db,
            "assignments",
            assignmentId
        )
    );

    if(!snap.exists()){

        alert("Form Not Found");
        return;

    }

    assignmentData =
    snap.data();

    document.getElementById(
        "formTitle"
    ).textContent =
    assignmentData.title;

    document.getElementById(
        "formDescription"
    ).textContent =
    assignmentData.description || "";

    renderQuestions();

}

function renderQuestions(){

    const container =
    document.getElementById(
        "questionContainer"
    );

    container.innerHTML = "";

    assignmentData.questions.forEach(
    (question,index)=>{

        const card =
        document.createElement("div");

        card.className =
        "question-card";

        let html = `
        <div class="question-title">
        ${index+1}. ${question.text}
        </div>
        `;

        switch(question.type){

            case "short":

                html += `
                <input
                type="text"
                data-q="${index}">
                `;
                break;

            case "long":

                html += `
                <textarea
                rows="4"
                data-q="${index}">
                </textarea>
                `;
                break;

            case "multiple":

                html += `
                <select data-q="${index}">
                `;

                question.options.forEach(
                option=>{

                    html += `
                    <option>
                    ${option}
                    </option>
                    `;

                });

                html += `</select>`;
                break;

            case "checkbox":

                question.options.forEach(
                option=>{

                    html += `
                    <label>
                    <input
                    type="checkbox"
                    value="${option}"
                    data-q="${index}">
                    ${option}
                    </label>
                    <br>
                    `;

                });

                break;
            case "image":

    html += `
    <input
    type="file"
    accept="image/*"
    data-q="${index}">
    `;

    break;

case "video":

    html += `
    <input
    type="file"
    accept="video/*"
    data-q="${index}">
    `;

    break;
        }

        card.innerHTML = html;

        container.appendChild(card);

    });

}

document
.getElementById("submitBtn")
.addEventListener("click",submitForm);
async function uploadToCloudinary(file){

    const formData = new FormData();

    formData.append(
        "file",
        file
    );

    formData.append(
        "upload_preset",
        UPLOAD_PRESET
    );

    const response =
    await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`,
        {
            method:"POST",
            body:formData
        }
    );

    const data =
    await response.json();

    return data.secure_url;
}
async function submitForm(){

    const answers = {};

    for(
        let index = 0;
        index < assignmentData.questions.length;
        index++
    ){

        const question =
        assignmentData.questions[index];

        if(question.type === "checkbox"){

            answers[index] = [];

            document
            .querySelectorAll(
                `[data-q="${index}"]`
            )
            .forEach(box=>{

                if(box.checked){

                    answers[index].push(
                        box.value
                    );

                }

            });

        }
        else if(
            question.type === "image" ||
            question.type === "video"
        ){

            const input =
            document.querySelector(
                `[data-q="${index}"]`
            );

            if(
                input.files.length > 0
            ){

                const url =
                await uploadToCloudinary(
                    input.files[0]
                );

                answers[index] =
                url;

            }else{

                answers[index] = "";

            }

        }
        else{

            const input =
            document.querySelector(
                `[data-q="${index}"]`
            );

            answers[index] =
            input.value;

        }

    }

    await addDoc(
        collection(
            db,
            "assignmentResponses"
        ),
        {
            assignmentId,
            teamId,
            userId:
            auth.currentUser.uid,
            answers,
            createdAt:
            serverTimestamp()
        }
    );

    alert(
        "Response Submitted"
    );

}

</script>

</body>
</html>
