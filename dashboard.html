<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BIGBLUE Coding - Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    display: flex;
    height: 100vh;
}

/* サイドバー */
.sidebar {
    width: 240px;
    background: #1f2937;
    color: white;
    padding: 20px;
}

.sidebar h2 {
    font-size: 18px;
    margin-bottom: 20px;
}

.menu-item {
    padding: 10px;
    margin: 5px 0;
    background: #374151;
    border-radius: 6px;
    cursor: pointer;
}

.menu-item:hover {
    background: #4b5563;
}

/* メイン */
.main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* カード */
.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* ボタン */
button {
    border: none;
    padding: 6px 10px;
    margin-left: 5px;
    border-radius: 5px;
    cursor: pointer;
}

.approve {
    background: #16a34a;
    color: white;
}

.reject {
    background: #dc2626;
    color: white;
}

/* チャット */
.chat-box {
    height: 200px;
    overflow-y: auto;
    border: 1px solid #ddd;
    padding: 10px;
    background: #fafafa;
    margin-bottom: 10px;
}

.chat-input {
    display: flex;
}

.chat-input input {
    flex: 1;
    padding: 8px;
}

.chat-input button {
    background: #2563eb;
    color: white;
}
</style>
</head>

<body>

<!-- サイドバー -->
<div class="sidebar">
    <h2>BIGBLUE Coding</h2>
    <div class="menu-item" onclick="showSection('dashboard')">Dashboard</div>
    <div class="menu-item" onclick="showSection('requests')">Join Requests</div>
    <div class="menu-item" onclick="showSection('chat')">Chat</div>
</div>

<!-- メイン -->
<div class="main">

    <!-- Dashboard -->
    <div id="dashboard" class="section">
        <h2>概要</h2>
        <div class="card">
            <p>ようこそ！チーム管理ダッシュボードです。</p>
        </div>
    </div>

    <!-- Join Requests -->
    <div id="requests" class="section" style="display:none;">
        <h2>参加申請</h2>

        <div id="requestList"></div>

    </div>

    <!-- Chat -->
    <div id="chat" class="section" style="display:none;">
        <h2>チームチャット</h2>

        <div class="chat-box" id="chatBox"></div>

        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="メッセージを入力...">
            <button onclick="sendMessage()">送信</button>
        </div>
    </div>

</div>

<script>
/* =========================
   仮データ（API未接続でも動く）
========================= */

let joinRequests = [
    { id: 1, name: "User A" },
    { id: 2, name: "User B" },
    { id: 3, name: "User C" }
];

let chatMessages = [
    { user: "System", text: "Welcome to BIGBLUE Coding!" }
];

/* =========================
   画面切替
========================= */
function showSection(id) {
    document.querySelectorAll(".section").forEach(sec => {
        sec.style.display = "none";
    });
    document.getElementById(id).style.display = "block";

    if (id === "requests") renderRequests();
    if (id === "chat") renderChat();
}

/* =========================
   参加申請レンダリング
========================= */
function renderRequests() {
    const container = document.getElementById("requestList");
    container.innerHTML = "";

    joinRequests.forEach(req => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <strong>${req.name}</strong>
            <div style="float:right;">
                <button class="approve" onclick="approve(${req.id})">Approve</button>
                <button class="reject" onclick="reject(${req.id})">Reject</button>
            </div>
        `;

        container.appendChild(div);
    });
}

function approve(id) {
    joinRequests = joinRequests.filter(r => r.id !== id);
    renderRequests();
    alert("Approved");
}

function reject(id) {
    joinRequests = joinRequests.filter(r => r.id !== id);
    renderRequests();
    alert("Rejected");
}

/* =========================
   チャット
========================= */
function renderChat() {
    const box = document.getElementById("chatBox");
    box.innerHTML = "";

    chatMessages.forEach(msg => {
        const div = document.createElement("div");
        div.textContent = msg.user + ": " + msg.text;
        box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById("chatInput");
    const text = input.value.trim();

    if (!text) return;

    chatMessages.push({ user: "You", text });
    input.value = "";

    renderChat();
}

/* 初期表示 */
renderRequests();
</script>

</body>
</html>
