<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Athletic Cloud</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{

    background:#111;
    color:white;

    padding:20px 40px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{

    font-size:1.8rem;
    font-weight:bold;
    letter-spacing:2px;
}

.logout-btn{

    background:white;
    color:#111;

    border:none;

    padding:10px 20px;

    border-radius:8px;

    cursor:pointer;

    font-weight:bold;
}

.main{

    max-width:1200px;
    margin:50px auto;

    padding:0 20px;

    display:none;
}

.welcome{

    background:white;

    padding:30px;

    border-radius:15px;

    margin-bottom:30px;

    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.welcome h1{

    margin-bottom:10px;
}

    .team-actions{

    display:flex;
    gap:20px;

    margin-bottom:30px;
}

.team-actions button{

    padding:15px 25px;

    border:none;
    border-radius:10px;

    background:#111;
    color:white;

    font-weight:bold;
    cursor:pointer;
}

.card-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:25px;
}

.card{

    background:white;

    padding:30px;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,.1);

    cursor:pointer;

    transition:.3s;
}

.card:hover{

    transform:translateY(-5px);
}

.card h3{

    margin-bottom:10px;
}

</style>
</head>

<body>

<header>

<div class="logo">
ATHLETIC CLOUD
</div>

<button
id="logoutBtn"
class="logout-btn">
Logout
</button>

<h2>My Teams</h2>
<div id="teamList"></div>
</header>

<div class="main">

<div class="welcome">

<h1 id="username">
Loading...
</h1>

<p id="email">
Loading...
</p>

</div>

<div class="team-actions">

    <button id="createTeamBtn">
        Create Team
    </button>

    <button id="joinTeamBtn">
        Join Team
    </button>

</div>

<div class="card-grid">

<div class="card">
<h3>Playbook Cloud</h3>
<p>Create and search team concepts.</p>
</div>

<div class="card">
<h3>Video Library</h3>
<p>Upload and share game film.</p>
</div>

<div class="card">
<h3>Analytics</h3>
<p>Searchable team data.</p>
</div>

<div class="card">
<h3>Team Workspace</h3>
<p>Collaborate with players and coaches.</p>
</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
  authDomain: "athletic-cloud-33538.firebaseapp.com",
  projectId: "athletic-cloud-33538",
  storageBucket: "athletic-cloud-33538.firebasestorage.app",
  messagingSenderId: "1020993809301",
  appId: "1:1020993809301:web:a31e28377788bef965249c"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {

    if(!user){

        window.location.href =
        "login.html";

        return;
    }

    const docRef =
doc(db,"users",user.uid);

const docSnap =
await getDoc(docRef);

if(!docSnap.exists()){

    alert(
        "User profile not found"
    );

    await signOut(auth);

    window.location.href =
    "login.html";

    return;
}

const data =
docSnap.data();

document.getElementById(
"username"
).innerText =
`Welcome, ${data.name}`;

document.getElementById(
"email"
).innerText =
data.email;
document.querySelector(
".main"
).style.display =
"block";
}
);

document
.getElementById("logoutBtn")
.addEventListener("click", async () => {

    await signOut(auth);

    window.location.href =
    "login.html";

});

document
.getElementById("createTeamBtn")
.addEventListener("click",()=>{

    window.location.href =
    "create-team.html";

});

document
.getElementById("joinTeamBtn")
.addEventListener("click",()=>{

    window.location.href =
    "join-team.html";

});

import {
    collection,
    getDocs
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import {
    getAuth
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const auth = getAuth();

async function loadMyTeams() {

    const user = auth.currentUser;
    if (!user) return;

    const teamList = document.getElementById("teamList");
    teamList.innerHTML = "";

    const snapshot = await getDocs(collection(db, "teams"));

    snapshot.forEach(docSnap => {
        const data = docSnap.data();

        const members = data.members || [];

        // 👉 自分が入っているteamだけ表示
        if (members.includes(user.uid)) {

            const div = document.createElement("div");

            div.style.padding = "12px";
            div.style.margin = "10px 0";
            div.style.background = "#fff";
            div.style.borderRadius = "8px";
            div.style.cursor = "pointer";
            div.style.boxShadow = "0 2px 10px rgba(0,0,0,0.05)";

            div.innerHTML = `
                <strong>${data.name}</strong>
            `;

            div.addEventListener("click", () => {
                window.location.href = `team.html?teamId=${docSnap.id}`;
            });

            teamList.appendChild(div);
        }
    });
}

// ログイン確定後に実行
auth.onAuthStateChanged((user) => {
    if (user) {
        loadMyTeams();
    }
});

</script>

</body>
</html>
