<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team | Athletic Cloud</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 40px;
    background: #f5f5f5;
}

/* メインカード */
.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* タイトル */
h1 {
    margin-bottom: 20px;
}

h2 {
    margin-top: 20px;
}

/* 情報行 */
.info {
    font-size: 14px;
    color: #333;
    margin-bottom: 10px;
}

.label {
    font-weight: bold;
    color: #666;
}

/* メンバーリスト */
#memberList {
    list-style: none;
    padding: 0;
}

#memberList li {
    padding: 10px;
    margin-bottom: 8px;
    background: #f8f8f8;
    border-radius: 8px;
}

/* フォーム */
.form-group {
    margin-bottom: 12px;
}

input, select {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
}

/* ボタン */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #111;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #333;
}

hr {
    margin: 20px 0;
    border: none;
    border-top: 1px solid #eee;
}
</style>
</head>

<body>

<div class="container">

    <h1>Team Page</h1>

    <div class="info">
        <span class="label">Team ID:</span>
        <span id="teamId">loading...</span>
    </div>

    <div class="info">
        <span class="label">Team Name:</span>
        <span id="teamName">loading...</span>
    </div>

    <hr>

    <h2>Members</h2>
    <ul id="memberList"></ul>

    <hr>

    <h2>Add Member</h2>

    <div class="form-group">
        <input id="inviteUid" placeholder="User UID">
    </div>

    <div class="form-group">
        <select id="role">
            <option value="player">Player</option>
            <option value="coach">Coach</option>
            <option value="staff">Staff</option>
        </select>
    </div>

    <button id="addMemberBtn">Add Member</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538",
    storageBucket: "athletic-cloud-33538.firebasestorage.app",
    messagingSenderId: "1020993809301",
    appId: "1:1020993809301:web:a31e28377788bef965249c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// teamId取得
const params = new URLSearchParams(window.location.search);
const teamId = params.get("teamId");

document.getElementById("teamId").textContent = teamId;

async function loadTeam() {

    try {

        console.log("Loading Team...");
        console.log("Team ID:", teamId);

        const ref =
        doc(db, "teams", teamId);

        const snap =
        await getDoc(ref);

        console.log("Team Exists:",
        snap.exists());

        console.log("Team Data:",
        snap.data());

        if (!snap.exists()) {

            document.getElementById(
            "teamName"
            ).textContent = "Not Found";

            return;
        }

        const data =
        snap.data();

        document.getElementById(
        "teamName"
        ).textContent =
        data.name || "No Team Name";

        const memberList =
        document.getElementById(
        "memberList"
        );

        memberList.innerHTML = "";

        const members =
        data.members || {};

        console.log("Members:",
        members);

       for (const uid of members) {

    console.log(
        "Loading User:",
        uid
    );

    let name = uid;

    try {

        const userRef =
        doc(db, "users", uid);

        const userSnap =
        await getDoc(userRef);

        console.log(
            "User Exists:",
            userSnap.exists()
        );

        if(userSnap.exists()){

            const userData =
            userSnap.data();

            console.log(
                "User Data:",
                userData
            );

            name =
            userData.name ||
            uid;
        }

    }
    catch(err){

        console.error(
            "User Load Error:",
            err
        );
    }

    const li =
    document.createElement("li");

    li.textContent =
    `${name}`;

    memberList.appendChild(li);
}

    }
    catch(err){

        console.error(
            "Team Load Error:",
            err
        );

        document.getElementById(
        "teamName"
        ).textContent =
        "Error";
    }
}

// =====================
// 🔥 メンバー追加
// =====================
document.getElementById("addMemberBtn").addEventListener("click", async () => {

    const uid = document.getElementById("inviteUid").value;
    const role = document.getElementById("role").value;

    console.log("ADD MEMBER:", uid, role, teamId);

    if (!uid) return alert("User UID required");

    const ref = doc(db, "teams", teamId);

    await updateDoc(ref, {
        [`members.${uid}`]: role
    });

    await loadTeam();
});

// 初期ロード
loadTeam();

</script>

</body>
</html>
