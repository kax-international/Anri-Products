<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team | Athletic Cloud</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

header{
    background:#111;
    color:white;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.logo{
    font-size:1.8rem;
    font-weight:bold;
    letter-spacing:2px;
    cursor:pointer;
}

.logout-btn{
    padding:10px 20px;
    background:white;
    color:#111;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.logout-btn:hover{
    background:#e5e5e5;
}

.back-btn{
    position:fixed;
    top:90px;
    right:20px;

    width:auto;
    padding:10px 20px;

    background:white;
    color:#111; /* ←これ追加 */

    border:none;
    border-radius:8px;
    cursor:pointer;

    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.container{
    max-width:900px;
    margin:40px auto;
    padding:30px;
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.top-actions{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.nav-btn{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    cursor:pointer;
}

.nav-btn:hover{
    background:#333;
}

.info{
    font-size:14px;
    margin-bottom:10px;
}

.label{
    font-weight:bold;
    color:#666;
}

#memberList{
    list-style:none;
    padding:0;
}

#memberList li{
    padding:10px;
    margin-bottom:8px;
    background:#f8f8f8;
    border-radius:8px;
}

.form-group{
    margin-bottom:12px;
}

input,select{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
.section-title{
    margin-top:20px;
    margin-bottom:10px;
    font-size:18px;
    font-weight:bold;
    color:#111;
}
</style>
</head>

<body>

<header>
    <span class="logo" id="homeLogo">ATHLETIC CLOUD</span>
    <button id="logoutBtn" class="logout-btn">Logout</button>
</header>

<button id="backBtn" class="back-btn">← Dashboard</button>

<div class="container">

    <h1>Team Page</h1>
<h2 class="section-title">Assignment</h2>
<div class="top-actions">

    <button
        class="nav-btn"
        onclick="goCreateAssignment()">
        Create Form
    </button>
    <button
        class="nav-btn"
        onclick="goAssignmentView()">
        Input Form
    </button>
    <button
        class="nav-btn"
        onclick="goAssignmentDatabase()">
        Search Database
    </button>
    <button
        class="nav-btn"
        onclick="goSearchEngine()">
        SearchEngine
    </button>

</div>
<div class="info">
    <span class="label">Team ID:</span>
    <span id="teamId">loading...</span>
</div>

    <div class="info">
        <span class="label">Team Name:</span>
        <span id="teamName">loading...</span>
    </div>

    <hr>

    <h2>Members</h2>
    <ul id="memberList"></ul>

    <hr>

    <h2>Add Member</h2>

    <div class="form-group">
        <input id="inviteUid" placeholder="User UID">
    </div>

    <div class="form-group">
        <select id="role">
            <option value="player">Player</option>
            <option value="coach">Coach</option>
            <option value="staff">Staff</option>
        </select>
    </div>

    <button id="addMemberBtn">Add Member</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

import {
    getFirestore,
    doc,
    getDoc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538",
    storageBucket: "athletic-cloud-33538.firebasestorage.app",
    messagingSenderId: "1020993809301",
    appId: "1:1020993809301:web:a31e28377788bef965249c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const params = new URLSearchParams(location.search);
const teamId = params.get("teamId");

document.getElementById("teamId").textContent = teamId;

// nav
window.goCreateAssignment = function () {
    window.location.href =
    `Assignmentcreate.html?teamId=${teamId}`;
};
window.goAssignmentView = function () {
    window.location.href =
    `AssignmentView.html?teamId=${teamId}`;
};
window.goAssignmentDatabase = function () {
    window.location.href =
    `AssignmentResult.html?teamId=${teamId}`;
};
window.goSearchEngine = function () {
    window.location.href =
    `Assignment.html?teamId=${teamId}`;
};

// logout
document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut(auth);
    location.href = "login.html";
});

document.getElementById("homeLogo").onclick = () => {
    location.href = "AthleticCloud.html";
};

document.getElementById("backBtn").onclick = () => {
    location.href = "dashboard.html";
};

async function loadTeam(){
    const ref = doc(db, "teams", teamId);
    const snap = await getDoc(ref);

    if(!snap.exists()){
        document.getElementById("teamName").textContent = "Not Found";
        return;
    }

    const data = snap.data();
    document.getElementById("teamName").textContent = data.name || "";

    const memberList = document.getElementById("memberList");
    memberList.innerHTML = "";

    const members = data.members || {};

    for(const [uid, memberRole] of Object.entries(members)){
        let name = uid;

        try{
            const userSnap = await getDoc(doc(db, "users", uid));
            if(userSnap.exists()){
                name = userSnap.data().name || uid;
            }
        }catch(e){}

        const li = document.createElement("li");
        li.textContent = `${name} (${memberRole})`;
        memberList.appendChild(li);
    }
}

// add member
document.getElementById("addMemberBtn").addEventListener("click", async () => {
    const uid = document.getElementById("inviteUid").value;
    const role = document.getElementById("role").value;

    if(!uid) return alert("User UID required");

    await updateDoc(doc(db, "teams", teamId), {
        [`members.${uid}`]: role
    });

    await loadTeam();
});

// auth
onAuthStateChanged(auth, (user) => {
    if(!user){
        location.href = "login.html";
        return;
    }
    loadTeam();
});
</script>

</body>
</html>
