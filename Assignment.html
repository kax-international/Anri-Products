<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignments | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

header{
    background:#111;
    color:#fff;
    padding:20px 40px;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:30px auto;
    padding:20px;
}

.search-box{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ddd;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:12px;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.card:hover{
    transform:translateY(-2px);
}
.request-btn{
    background:#111;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
}

.requested-btn{
    background:#aaa;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:8px;
}

.open-btn{
    background:#2d7ef7;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>ATHLETIC CLOUD - ASSIGNMENTS</header>

<div class="container">

    <input id="search" class="search-box" placeholder="Search assignments...">

    <div id="list">Loading...</div>

</div>

<script type="module">
import {
    getFirestore,
    collection,
    getDocs,
    doc,
    getDoc,
    setDoc
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
let currentUser = null;
let currentTeam = null;
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538",
    storageBucket: "athletic-cloud-33538.firebasestorage.app",
    messagingSenderId: "1020993809301",
    appId: "1:1020993809301:web:a31e28377788bef965249c"
};

// ✅ init
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// URL params
const teamId = new URLSearchParams(location.search).get("teamId");

// DOM
const listEl = document.getElementById("list");
const searchEl = document.getElementById("search");

let assignments = [];

/* -----------------------------
   AUTH GATE
----------------------------- */
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        location.href = "login.html";
        return;
    }

    currentUser = user;

    const teamRef =
    doc(db,"teams",teamId);

    const teamSnap =
    await getDoc(teamRef);

    if(teamSnap.exists()){
        currentTeam =
        teamSnap.data();
    }

    await loadAssignments();
});
async function getMyRequestStatus(
    assignmentId
){

    const ref = doc(
        db,
        "featureRequests",
        `${assignmentId}_${currentUser.uid}`
    );

    const snap =
    await getDoc(ref);

    if(!snap.exists()){
        return "none";
    }

    return snap.data().status;
}
async function sendRequest(
    assignmentId
){

    const assignmentRef =
    doc(db,"assignments",assignmentId);

    const assignmentSnap =
    await getDoc(assignmentRef);

    const data =
    assignmentSnap.data();

    await setDoc(
        doc(
            db,
            "featureRequests",
            `${assignmentId}_${currentUser.uid}`
        ),
        {

            requesterUid:
            currentUser.uid,

            requesterName:
            currentUser.displayName ||
            currentUser.email,

            ownerUid:
            data.ownerUid,

            teamId:
            data.teamId,

            teamName:
            currentTeam?.name || "",

            featureType:
"searchEngine",
            assignmentId:
            assignmentId,

            assignmentTitle:
            data.title,

            status:
            "pending",

            createdAt:
            Date.now()
        }
    );

    await loadAssignments();
}
/* -----------------------------
   LOAD DATA
----------------------------- */
async function loadAssignments() {

    try {
        listEl.innerHTML = "Loading...";

        const snap = await getDocs(collection(db, "assignments"));

        assignments = [];

        snap.forEach(docSnap => {

            const data = docSnap.data();

            // team filter
            if (teamId && data.teamId !== teamId) return;

            assignments.push({
                id: docSnap.id,
                ...data
            });
        });

        await render(assignments);

    } catch (err) {
        console.error(err);
        listEl.innerHTML = "<p>Error loading assignments</p>";
    }
}

/* -----------------------------
   RENDER
----------------------------- */
async function render(data) {

    listEl.innerHTML = "";

    if (data.length === 0) {

        listEl.innerHTML =
        "<p>No assignments found</p>";

        return;
    }

    for (const a of data) {

        const div =
        document.createElement("div");

        div.className = "card";

        const status =
        await getMyRequestStatus(a.id);

        let buttonHTML = "";

        if (
            status === "none" ||
            status === "rejected"
        ) {

            buttonHTML = `
                <button
                    class="request-btn"
                    onclick="event.stopPropagation(); window.requestMap('${a.id}')">
                    Request
                </button>
            `;
        }

        if (status === "pending") {

            buttonHTML = `
                <button
                    class="requested-btn"
                    disabled>
                    Requested
                </button>
            `;
        }

        if (status === "approved") {

            buttonHTML = `
                <button
                    class="open-btn"
                    onclick="event.stopPropagation(); window.openMap('${a.id}')">
                    Open
                </button>
            `;
        }

        div.innerHTML = `
            <h3>${a.title || ""}</h3>

            <p>
                ${a.description || ""}
            </p>

            <div style="margin-top:10px;">
                ${buttonHTML}
            </div>
        `;

        div.onclick = () => {

            location.href =
            \`AssignmentMap.html?id=${a.id}&teamId=${teamId}\`;
        };

        listEl.appendChild(div);
    }
}

/* -----------------------------
   SEARCH
----------------------------- */
searchEl.addEventListener(
    "input",
    async (e)=>{

    const q = e.target.value.toLowerCase();

    const filtered = assignments.filter(a =>
        (a.title || "").toLowerCase().includes(q) ||
        (a.description || "").toLowerCase().includes(q)
    );

    await render(filtered);
});
window.requestMap =
async (id)=>{

    await sendRequest(id);
};

window.openMap =
(id)=>{

    location.href =
    `AssignmentMap.html?id=${id}&teamId=${teamId}`;
};
</script>

</body>
</html>
