<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignments | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

header{
    background:#111;
    color:#fff;
    padding:20px 40px;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:30px auto;
    padding:20px;
}

.search-box{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ddd;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:12px;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.card:hover{
    transform:translateY(-2px);
}
</style>
</head>

<body>

<header>ATHLETIC CLOUD - ASSIGNMENTS</header>

<div class="container">

    <input id="search" class="search-box" placeholder="Search assignments...">

    <div id="list">Loading...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538",
    storageBucket: "athletic-cloud-33538.firebasestorage.app",
    messagingSenderId: "1020993809301",
    appId: "1:1020993809301:web:a31e28377788bef965249c"
};

// ✅ init
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// URL params
const teamId = new URLSearchParams(location.search).get("teamId");

// DOM
const listEl = document.getElementById("list");
const searchEl = document.getElementById("search");

let assignments = [];

/* -----------------------------
   AUTH GATE
----------------------------- */
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        location.href = "login.html";
        return;
    }

    await loadAssignments();
});

/* -----------------------------
   LOAD DATA
----------------------------- */
async function loadAssignments() {

    try {
        listEl.innerHTML = "Loading...";

        const snap = await getDocs(collection(db, "assignments"));

        assignments = [];

        snap.forEach(docSnap => {

            const data = docSnap.data();

            // team filter
            if (teamId && data.teamId !== teamId) return;

            assignments.push({
                id: docSnap.id,
                ...data
            });
        });

        render(assignments);

    } catch (err) {
        console.error(err);
        listEl.innerHTML = "<p>Error loading assignments</p>";
    }
}

/* -----------------------------
   RENDER
----------------------------- */
function render(data) {

    listEl.innerHTML = "";

    if (data.length === 0) {
        listEl.innerHTML = "<p>No assignments found</p>";
        return;
    }

    data.forEach(a => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${a.title || ""}</h3>
            <p>${a.description || ""}</p>
        `;

        div.onclick = () => {
            location.href = `AssignmentMap.html?id=${a.id}&teamId=${teamId}`;
        };

        listEl.appendChild(div);
    });
}

/* -----------------------------
   SEARCH
----------------------------- */
searchEl.addEventListener("input", (e) => {

    const q = e.target.value.toLowerCase();

    const filtered = assignments.filter(a =>
        (a.title || "").toLowerCase().includes(q) ||
        (a.description || "").toLowerCase().includes(q)
    );

    render(filtered);
});

</script>

</body>
</html>
