<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Library | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
}

.container{
    display:flex;
    height:100vh;
}

/* LEFT */
.sidebar{
    width:260px;
    background:#000;
    padding:20px;
    overflow:auto;
    border-right:1px solid #333;
}

.playlist{
    padding:10px;
    margin-bottom:10px;
    background:#222;
    border-radius:8px;
    cursor:pointer;
}

.playlist:hover{
    background:#333;
}

/* CENTER */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* VIDEO LIST */
.video-list{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:10px;
    padding:20px;
    background:#111;
}

.video-card{
    background:#222;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.video-card:hover{
    background:#333;
}

/* PLAYER */
.player{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
}

video{
    max-width:100%;
    max-height:100%;
}
</style>
</head>

<body>

<div class="container">

    <div class="sidebar">
        <h3>Playlists</h3>
        <div id="playlistList"></div>
    </div>

    <div class="main">

        <div class="video-list" id="videoList"></div>

        <div class="player">
            <video id="videoPlayer" controls></video>
        </div>

    </div>

</div>

<script type="module">
const rawTeamId = new URLSearchParams(location.search).get("teamId");
const teamId = rawTeamId ? rawTeamId.trim() : null;

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    query,
    where
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "XXX",
    authDomain: "XXX",
    projectId: "XXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =======================
   LOAD PLAYLISTS
======================= */
async function loadPlaylists(){

    const q = query(
        collection(db, "playlists"),
        where("teamId", "==", teamId)
    );

    const snap = await getDocs(q);

    const container = document.getElementById("playlistList");
    container.innerHTML = "";

    console.log("playlists found:", snap.size);

    snap.forEach(docSnap => {

        const data = docSnap.data();

        const div = document.createElement("div");
        div.className = "playlist";
        div.textContent = data.title;

        div.onclick = () => {
            loadVideos(docSnap.id); // ← playlistIdはdocSnap.id
        };

        container.appendChild(div);
    });
}

/* =======================
   LOAD VIDEOS
======================= */
async function loadVideos(playlistId){

    console.log("loading playlist:", playlistId);

    const q = query(
        collection(db, "videos"),
        where("teamId", "==", teamId),
        where("playlistId", "==", playlistId)
    );

    const snap = await getDocs(q);

    console.log("videos found:", snap.size);

    const container = document.getElementById("videoList");
    container.innerHTML = "";

    snap.forEach(docSnap => {

        const data = docSnap.data();

        const div = document.createElement("div");
        div.className = "video-card";

        div.innerHTML = `
            <div>🎬 VIDEO</div>
            <div style="font-size:12px;color:#aaa;">
                ${data.subtitle || "no subtitle"}
            </div>
        `;

        div.onclick = () => {
            document.getElementById("videoPlayer").src = data.videoUrl;
        };

        container.appendChild(div);
    });
}

/* INIT */
loadPlaylists();

</script>

</body>
</html>
