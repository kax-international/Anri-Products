<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Library | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
}

.container{
    display:flex;
    height:100vh;
}

/* LEFT */
.sidebar{
    width:260px;
    background:#000;
    padding:20px;
    overflow:auto;
    border-right:1px solid #333;
}

.playlist{
    padding:10px;
    margin-bottom:10px;
    background:#222;
    border-radius:8px;
    cursor:pointer;
}

.playlist:hover{
    background:#333;
}

/* CENTER */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* VIDEO LIST */
.video-list{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:10px;
    padding:20px;
    background:#111;
}

.video-card{
    background:#222;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.video-card:hover{
    background:#333;
}

/* PLAYER */
.player{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
}

video{
    max-width:100%;
    max-height:100%;
}
</style>
</head>

<body>

<div class="container">

    <div class="sidebar">
        <h3>Playlists</h3>
        <div id="playlistList"></div>
    </div>

    <div class="main">

        <div class="video-list" id="videoList"></div>

        <div class="player">
    <video id="videoPlayer" controls></video>
</div>

<div
    style="
        background:#1a1a1a;
        padding:15px;
        border-top:1px solid #333;
    "
>

    <h3>Comments</h3>

    <div
        id="commentList"
        style="
            max-height:200px;
            overflow:auto;
            margin-bottom:10px;
        "
    ></div>

    <textarea
        id="commentInput"
        placeholder="Write comment..."
        style="
            width:100%;
            height:80px;
            background:#222;
            color:white;
            border:1px solid #444;
            border-radius:8px;
            padding:10px;
        "
    ></textarea>

    <button
        id="saveCommentBtn"
        style="
            margin-top:10px;
            padding:10px 20px;
        "
    >
        Post Comment
    </button>

</div>
        <div id="subtitleBar"
     style="
        padding:10px;
        background:#1a1a1a;
        border-bottom:1px solid #333;
        display:flex;
        gap:10px;
        overflow-x:auto;
">
</div>

    </div>

</div>

<script type="module">
let allVideos = [];
let playlistSubtitles = [];
let currentPlaylistId = null;
let currentVideoId = null;
const rawTeamId = new URLSearchParams(location.search).get("teamId");
const teamId = rawTeamId ? rawTeamId.trim() : null;
import {
    getAuth,
    onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    query,
    getDoc,
    doc,
    where,
    addDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538",
    storageBucket: "athletic-cloud-33538.firebasestorage.app",
    messagingSenderId: "1020993809301",
    appId: "1:1020993809301:web:a31e28377788bef965249c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
let currentUser = null;
let currentTeam = null;
/* =======================
   LOAD PLAYLISTS
======================= */
async function loadPlaylists(){

    const q = query(
        collection(db, "playlists"),
        where("teamId", "==", teamId)
    );

    const snap = await getDocs(q);

    const container = document.getElementById("playlistList");
    container.innerHTML = "";

    console.log("playlists found:", snap.size);

    snap.forEach(docSnap => {

        const data = docSnap.data();

        const div = document.createElement("div");
        div.className = "playlist";
        div.textContent = data.title;

       div.onclick = async () => {

    currentPlaylistId = docSnap.id;

    await loadVideos(docSnap.id);

    await loadPlaylistSubtitles(docSnap.id);
};

        container.appendChild(div);
    });
}
/* =======================
   LOAD playlists
======================= */
async function loadPlaylistSubtitles(playlistId){

    const playlistDoc =
        await getDoc(
            doc(db,"playlists",playlistId)
        );

    const data = playlistDoc.data();

    playlistSubtitles =
        data.subtitles || [];

    const container =
        document.getElementById("playlistList");

    const oldSubtitles =
        document.getElementById("subtitleList");

    if(oldSubtitles){
        oldSubtitles.remove();
    }

    const subtitleDiv =
        document.createElement("div");

    subtitleDiv.id = "subtitleList";

    subtitleDiv.innerHTML =
        "<h4>Subtitles</h4>";

    playlistSubtitles.forEach(subtitle=>{

        const item =
            document.createElement("div");

        item.className = "playlist";

        item.textContent = subtitle;

        item.onclick = ()=>{

    const filtered =
        allVideos.filter(v =>
            v.subtitle === subtitle
        );

    renderVideos(filtered);
};

subtitleDiv.appendChild(item);

});

container.appendChild(subtitleDiv);
}
/* =======================
   LOAD VIDEOS
======================= */
async function loadVideos(playlistId){

    const snap =
        await getDocs(
            collection(
                db,
                "playlists",
                playlistId,
                "videos"
            )
        );

    allVideos = [];

    snap.forEach(docSnap=>{

        allVideos.push({
            id: docSnap.id,
            ...docSnap.data()
        });

    });

    console.log(
        "videos found:",
        allVideos.length
    );

    createSubtitleButtons();

    renderVideos(allVideos);
}
function createSubtitleButtons(){

    const bar =
        document.getElementById("subtitleBar");

    bar.innerHTML = "";

    const allBtn =
        document.createElement("button");

    allBtn.textContent = "All";

    allBtn.onclick = () => {

        renderVideos(allVideos);
    };

    bar.appendChild(allBtn);

    playlistSubtitles.forEach(subtitle => {

        const btn =
            document.createElement("button");

        btn.textContent = subtitle;

        btn.onclick = () => {

            const filtered =
                allVideos.filter(v =>
                    v.subtitle === subtitle
                );

            renderVideos(filtered);
        };

        bar.appendChild(btn);

    });
}
function renderVideos(videos){

    const container =
        document.getElementById("videoList");

    container.innerHTML = "";

    videos.forEach(data => {

        const div = document.createElement("div");

        div.className = "video-card";

        div.innerHTML = `
            <div>
    ${data.subtitle || "VIDEO"}
</div>
            <div style="font-size:12px;color:#aaa;">
                ${data.subtitle || "No Subtitle"}
            </div>
        `;

        div.onclick = () => {

    const player =
        document.getElementById("videoPlayer");

    player.src = data.videoUrl;

    player.play();

    currentVideoId = data.id;

    loadComments(
        currentPlaylistId,
        currentVideoId
    );
};

        container.appendChild(div);
    });
}
async function saveComment(){

    const text =
        document
        .getElementById("commentInput")
        .value
        .trim();

    if(!text){
        return;
    }

    await addDoc(
        collection(
            db,
            "playlists",
            currentPlaylistId,
            "videos",
            currentVideoId,
            "comments"
        ),
        {
            text,
            createdAt: serverTimestamp()
        }
    );

    document.getElementById(
        "commentInput"
    ).value = "";

    loadComments(
        currentPlaylistId,
        currentVideoId
    );
}
async function loadComments(
    playlistId,
    videoId
){

    const snap =
        await getDocs(
            collection(
                db,
                "playlists",
                playlistId,
                "videos",
                videoId,
                "comments"
            )
        );

    const container =
        document.getElementById(
            "commentList"
        );

    container.innerHTML = "";

    snap.forEach(docSnap => {

        const data =
            docSnap.data();

        const div =
            document.createElement("div");

        div.style.padding =
            "8px";

        div.style.marginBottom =
            "6px";

        div.style.background =
            "#222";

        div.style.borderRadius =
            "6px";

        div.textContent =
            data.text;

        container.appendChild(div);

    });
}
document
.getElementById("saveCommentBtn")
.onclick = saveComment;

onAuthStateChanged(auth,(user)=>{

    if(!user){

        location.href =
        "login.html";

        return;
    }

    currentUser = user;

    console.log(
        "Logged in:",
        user.uid
    );

    loadPlaylists();
});

</script>

</body>
</html>
