<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Video Library | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

.container{
    display:flex;
    height:100vh;
}

/* sidebar */
.sidebar{
    width:250px;
    background:#111;
    color:white;
    padding:20px;
    overflow:auto;
}

.playlist{
    padding:10px;
    margin-bottom:10px;
    background:#222;
    border-radius:8px;
    cursor:pointer;
}

.playlist:hover{
    background:#333;
}

/* main */
.main{
    flex:1;
    padding:20px;
    display:flex;
    flex-direction:column;
}

.video-list{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:10px;
    margin-bottom:20px;
}

.video-card{
    background:white;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.video-card:hover{
    background:#eee;
}

.player{
    flex:1;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
}

video{
    max-width:100%;
    max-height:100%;
}
</style>
</head>

<body>

<div class="container">

    <div class="sidebar">
        <h3>Playlists</h3>
        <div id="playlistList"></div>
    </div>

    <div class="main">

        <div class="video-list" id="videoList"></div>

        <div class="player">
            <video id="videoPlayer" controls></video>
        </div>

    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "XXX",
    authDomain: "XXX",
    projectId: "XXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const teamId = new URLSearchParams(location.search).get("teamId");

let currentPlaylist = null;

/* =======================
   load playlists
======================= */
async function loadPlaylists(){

    const snap = await getDocs(collection(db, "playlists"));

    const container = document.getElementById("playlistList");
    container.innerHTML = "";

    snap.forEach(docSnap => {

        const data = docSnap.data();

        if(data.teamId !== teamId) return;

        const div = document.createElement("div");
        div.className = "playlist";
        div.textContent = data.title;

        div.onclick = () => {
            currentPlaylist = docSnap.id;
            loadVideos(docSnap.id);
        };

        container.appendChild(div);
    });
}

/* =======================
   load videos
======================= */
async function loadVideos(playlistId){

    const snap = await getDocs(
        collection(db, "playlists", playlistId, "videos")
    );

    const container = document.getElementById("videoList");
    container.innerHTML = "";

    snap.forEach(docSnap => {

        const data = docSnap.data();

        const div = document.createElement("div");
        div.className = "video-card";

        div.innerHTML = `
            <div>🎬 Video</div>
            <div>${data.subtitle || ""}</div>
        `;

        div.onclick = () => {
            document.getElementById("videoPlayer").src = data.videoUrl;
        };

        container.appendChild(div);
    });
}

/* init */
loadPlaylists();

</script>

</body>
</html>
