<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Library | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

.container{
    max-width:1100px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    display:flex;
    gap:20px;
}

.sidebar{
    width:30%;
    border-right:1px solid #eee;
    padding-right:15px;
}

.main{
    width:70%;
}

.item{
    padding:10px;
    margin-bottom:8px;
    background:#f8f8f8;
    border-radius:8px;
    cursor:pointer;
}

.item:hover{
    background:#eaeaea;
}

.video-card{
    margin-bottom:20px;
}

video{
    width:100%;
    border-radius:10px;
}

.subtitle{
    font-size:13px;
    color:#666;
}
</style>
</head>

<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">
    <h3>Playlists</h3>
    <div id="playlistList"></div>
</div>

<!-- Main -->
<div class="main">
    <h3 id="currentTitle">Select Playlist</h3>
    <div id="videoList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(location.search);
const teamId = params.get("teamId");

// --------------------
// Load playlists
// --------------------
async function loadPlaylists(){

    const snap = await getDocs(collection(db, "playlists"));

    const list = document.getElementById("playlistList");
    list.innerHTML = "";

    snap.forEach(docSnap => {

        const data = docSnap.data();

        if(data.teamId !== teamId) return;

        const div = document.createElement("div");
        div.className = "item";
        div.textContent = data.title;

        div.onclick = () => loadVideos(docSnap.id, data.title);

        list.appendChild(div);
    });
}

// --------------------
// Load videos
// --------------------
async function loadVideos(playlistId, title){

    document.getElementById("currentTitle").textContent = title;

    const snap = await getDocs(
        collection(db, "playlists", playlistId, "videos")
    );

    const videoList = document.getElementById("videoList");
    videoList.innerHTML = "";

    snap.forEach(docSnap => {

        const v = docSnap.data();

        const div = document.createElement("div");
        div.className = "video-card";

        div.innerHTML = `
            <video controls src="${v.videoUrl}"></video>
            <div class="subtitle">${v.subtitle || ""}</div>
        `;

        videoList.appendChild(div);
    });
}

loadPlaylists();

</script>

</body>
</html>
