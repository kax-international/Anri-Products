<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment Map | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f3f3;
}

header{
    background:#111;
    color:white;
    padding:15px 20px;
    font-weight:bold;
}

/* CONTROL BAR */
.control-bar{
    display:flex;
    gap:10px;
    padding:10px 20px;
    align-items:center;
    flex-wrap:wrap;
}

input, select{
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:14px;
}

/* GRID */
#gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    cursor:pointer;
}

.card img,
.card video{
    width:100%;
    max-height:260px;
    object-fit:contain;
    background:#111;
}

/* INFO */
.info{
    padding:15px;
}

.title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

.meta{
    font-size:13px;
    color:#666;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    overflow:auto;
}

.modal-content{
    background:white;
    width:95%;
    max-width:1200px;
    margin:20px auto;
    padding:20px;
    border-radius:12px;
}

#close{
    float:right;
    font-size:32px;
    cursor:pointer;
}

.video{
    width:100%;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
    ATHLETIC CLOUD - Assignments
</header>

<div class="control-bar">

    <input id="searchInput" placeholder="Keyword search...">

    <select id="filterSelect">
        <option value="">Filter Question</option>
    </select>

    <select id="sortSelect">
        <option value="desc">Newest First</option>
        <option value="asc">Oldest First</option>
    </select>

</div>

<div id="gallery">Loading...</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <span id="close">&times;</span>
        <img id="modalImage">
        <div id="modalInfo"></div>
        <div id="modalVideo"></div>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    query,
    where,
    doc,
    getDoc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const params = new URLSearchParams(location.search);
const assignmentId = params.get("id");

let responses = [];
let filtered = [];
let questions = [];

/* AUTH */
onAuthStateChanged(auth, async (user) => {
    if(!user){
        location.href = "login.html";
        return;
    }
    await load();
});

/* LOAD */
async function load(){

    // assignment（質問名取得）
    const assignSnap = await getDoc(doc(db,"assignments",assignmentId));
    if(assignSnap.exists()){
        questions = assignSnap.data().questions || [];
        buildFilterUI();
    }

    // responses
    const q = query(
        collection(db,"assignmentResponses"),
        where("assignmentId","==",assignmentId)
    );

    const snap = await getDocs(q);

    responses = [];
    snap.forEach(d=>{
        responses.push({id:d.id,...d.data()});
    });

    filtered = [...responses];
    render(filtered);
}

/* FILTER UI（質問名で生成） */
function buildFilterUI(){

    const sel = document.getElementById("filterSelect");
    sel.innerHTML = `<option value="">Filter Question</option>`;

    questions.forEach((q,i)=>{
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = q.text;
        sel.appendChild(opt);
    });
}

/* SEARCH + FILTER */
function applyFilter(){

    const keyword = document.getElementById("searchInput").value.toLowerCase();
    const qIndex = document.getElementById("filterSelect").value;

    filtered = responses.filter(r=>{

        const answers = r.answers || {};

        // question filter
        if(qIndex !== ""){
            const v = answers[qIndex];
            if(!v) return false;

            if(keyword){
                return v.toString().toLowerCase().includes(keyword);
            }
            return true;
        }

        // global search
        return JSON.stringify(r).toLowerCase().includes(keyword);
    });

    sortAndRender();
}

/* SORT */
function sortAndRender(){

    const mode = document.getElementById("sortSelect").value;

    filtered.sort((a,b)=>{
        const ta = a.createdAt?.seconds || 0;
        const tb = b.createdAt?.seconds || 0;
        return mode === "asc" ? ta - tb : tb - ta;
    });

    render(filtered);
}

/* MEDIA */
function getTopMedia(r){

    let image = null;
    let video = null;

    for(const k in r.answers){
        const v = r.answers[k];

        if(!image && typeof v === "string" && v.includes("http")){
            if(v.match(/\.(jpg|png|jpeg|webp)/)) image = v;
        }

        if(!video && typeof v === "string" && v.includes("video")){
            video = v;
        }
    }

    if(image) return {type:"image",url:image};
    if(video) return {type:"video",url:video};

    return {type:"none",url:"https://via.placeholder.com/600x400?text=No+Image"};
}

/* TITLE = Q0 */
function getTitle(r){
    return r.answers?.[0] || r.userName || "Untitled";
}

/* RENDER */
function render(list){

    const g = document.getElementById("gallery");
    g.innerHTML = "";

    list.forEach(r=>{

        const media = getTopMedia(r);

        let mediaHTML =
            media.type === "image"
            ? `<img src="${media.url}">`
            : media.type === "video"
            ? `<video src="${media.url}" muted></video>`
            : `<img src="${media.url}">`;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            ${mediaHTML}
            <div class="info">
                <div class="title">${getTitle(r)}</div>
                <div class="meta">
                    ${r.userName || ""}<br>
                    ${new Date(r.createdAt?.seconds*1000||Date.now()).toLocaleString()}
                </div>
            </div>
        `;

        card.onclick = ()=>openModal(r);
        g.appendChild(card);
    });
}

/* MODAL */
function openModal(r){

    const modal = document.getElementById("modal");
    const img = document.getElementById("modalImage");
    const info = document.getElementById("modalInfo");
    const video = document.getElementById("modalVideo");

    const media = getTopMedia(r);
    img.src = media.type==="image" ? media.url : "";

    let html = `<h2>${getTitle(r)}</h2>`;

    questions.forEach((q,i)=>{
        html += `
            <p>
                <b>${q.text}:</b><br>
                ${r.answers?.[i] || ""}
            </p>
        `;
    });

    info.innerHTML = html;

    modal.style.display="block";
}

/* EVENTS */
document.getElementById("close").onclick=()=>{
    document.getElementById("modal").style.display="none";
};

document.getElementById("searchInput")
.addEventListener("input",applyFilter);

document.getElementById("filterSelect")
.addEventListener("change",applyFilter);

document.getElementById("sortSelect")
.addEventListener("change",sortAndRender);

</script>

</body>
</html>
