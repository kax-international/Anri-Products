<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment Map | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

header{
    background:#111;
    color:white;
    padding:20px 40px;
}

.container{
    max-width:900px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.user{
    font-weight:bold;
    margin-bottom:8px;
}

pre{
    white-space:pre-wrap;
    word-break:break-word;
    background:#f7f7f7;
    padding:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<header>ATHLETIC CLOUD - RESPONSES</header>

<div class="container">

    <h2 id="title">Loading responses...</h2>

    <div id="responses"></div>

</div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
    getFirestore,
    doc,
    getDoc,
    collection,
    getDocs,
    query,
    where
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538",
    storageBucket: "athletic-cloud-33538.appspot.com",
    messagingSenderId: "1020993809301",
    appId: "1:1020993809301:web:a31e28377788bef965249c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const params = new URLSearchParams(location.search);
const assignmentId = params.get("id");
const teamId = params.get("teamId");

const responsesEl = document.getElementById("responses");
const titleEl = document.getElementById("title");

let assignment = null;

/* --------------------------
   AUTH
-------------------------- */
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        location.href = "login.html";
        return;
    }

    await loadAssignment();
    await loadResponses();
});

/* --------------------------
   Assignment取得（タイトル表示用）
-------------------------- */
async function loadAssignment(){

    try {

        const snap = await getDoc(
            doc(db, "assignments", assignmentId)
        );

        if (!snap.exists()) {
            titleEl.innerText = "Assignment not found";
            return;
        }

        assignment = snap.data();
        titleEl.innerText = assignment.title;

    } catch (err) {
        console.error(err);
        titleEl.innerText = "Error loading assignment";
    }
}

/* --------------------------
   Responses取得
-------------------------- */
async function loadResponses(){

    try {

        responsesEl.innerHTML = "Loading...";

        const q = query(
            collection(db, "assignmentResponses"),
            where("assignmentId", "==", assignmentId)
        );

        const snap = await getDocs(q);

        const list = [];

        snap.forEach(docSnap => {
            list.push({
                id: docSnap.id,
                ...docSnap.data()
            });
        });

        render(list);

    } catch (err) {
        console.error("Firestore error:", err);
        responsesEl.innerHTML = "Permission error or no data";
    }
}

/* --------------------------
   Render（表示のみ）
-------------------------- */
function render(list){

    if(list.length === 0){
        responsesEl.innerHTML = "<p>No responses found</p>";
        return;
    }

    let html = "";

    list.forEach(r => {

        html += `
        <div class="card">
            <div class="user">
                ${r.userName || r.userId || "Unknown user"}
            </div>
            <pre>${JSON.stringify(r.answers, null, 2)}</pre>
        </div>
        `;
    });

    responsesEl.innerHTML = html;
}

</script>

</body>
</html>
