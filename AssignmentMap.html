<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment Map | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

header{
    background:#111;
    padding:20px 40px;
    font-weight:bold;
}

.container{
    max-width:1100px;
    margin:30px auto;
    padding:20px;
}

/* CARD */
.card{
    background:#1a1a1a;
    border-radius:16px;
    overflow:hidden;
    margin-bottom:20px;
    cursor:pointer;
    transition:0.2s;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.card:hover{
    transform:scale(1.01);
}

.card-img{
    width:100%;
    height:220px;
    object-fit:cover;
    background:#333;
}

.card-body{
    padding:15px;
}

.card-title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

.card-sub{
    font-size:13px;
    opacity:0.7;
}

/* MODAL */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    width:90%;
    max-width:900px;
    background:#111;
    border-radius:12px;
    padding:20px;
}

.modal img{
    width:100%;
    border-radius:10px;
    margin-bottom:10px;
}

.video{
    width:100%;
    margin-top:15px;
}
</style>
</head>

<body>

<header>
    ATHLETIC CLOUD - RESPONSE MAP
</header>

<div class="container" id="list"></div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    query,
    where
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const params = new URLSearchParams(location.search);
const assignmentId = params.get("id");

let responses = [];

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        location.href = "login.html";
        return;
    }

    await load();
});

async function load(){

    const q = query(
        collection(db, "assignmentResponses"),
        where("assignmentId", "==", assignmentId)
    );

    const snap = await getDocs(q);

    responses = [];

    snap.forEach(docSnap => {
        responses.push({
            id: docSnap.id,
            ...docSnap.data()
        });
    });

    renderCards();
}

/* =========================
   BIG BLUE OFFENSE STYLE CARD
========================= */

function getImage(r){
    // 最初のimage URLを探す（将来拡張用）
    for(const key in r.answers){
        const v = r.answers[key];
        if(typeof v === "string" && v.includes("http")){
            if(v.includes("cloudinary") || v.includes("image")){
                return v;
            }
        }
    }
    return "https://via.placeholder.com/800x400?text=No+Image";
}

function getTitle(r){
    return r.answers?.[0] || r.userName || "Untitled";
}

function renderCards(){

    const list = document.getElementById("list");
    list.innerHTML = "";

    responses.forEach(r => {

        const card = document.createElement("div");
        card.className = "card";

        const img = getImage(r);
        const title = getTitle(r);

        card.innerHTML = `
            <img class="card-img" src="${img}">
            <div class="card-body">
                <div class="card-title">${title}</div>
                <div class="card-sub">${r.userName || ""}</div>
            </div>
        `;

        card.onclick = () => openModal(r);

        list.appendChild(card);
    });
}

/* =========================
   MODAL VIEW
========================= */

function openModal(r){

    const modal = document.getElementById("modal");
    const content = document.getElementById("modalContent");

    let html = "";

    html += `<h2>${r.userName || ""}</h2>`;
    html += `<pre style="color:#ccc;">${JSON.stringify(r.answers, null, 2)}</pre>`;

    // video表示（もしあれば）
    for(const key in r.answers){
        const v = r.answers[key];
        if(typeof v === "string" && v.includes("video")){
            html += `
                <video class="video" controls>
                    <source src="${v}">
                </video>
            `;
        }
    }

    content.innerHTML = html;
    modal.style.display = "flex";
}

document.getElementById("modal").onclick = () => {
    document.getElementById("modal").style.display = "none";
};

</script>

</body>
</html>
