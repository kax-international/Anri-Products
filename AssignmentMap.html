<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment View | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

header{
    background:#111;
    color:white;
    padding:20px 40px;
}

.container{
    max-width:900px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

video{
    width:100%;
    border-radius:10px;
}
</style>
</head>

<body>

<header>ATHLETIC CLOUD - VIEW</header>

<div class="container">

    <h2 id="title">Loading...</h2>
    <p id="desc"></p>

    <div id="videoArea"></div>

    <h3>Questions</h3>
    <div id="questions"></div>

    <h3>Responses</h3>
    <div id="responses"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    collection,
    getDocs,
    query,
    where
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const params = new URLSearchParams(location.search);
const assignmentId = params.get("id");
const teamId = params.get("teamId");

const container = document.getElementById("container");

/* ---------------------------
   AUTH GATE（ここ超重要）
----------------------------*/
onAuthStateChanged(auth, async (user) => {

    if (!user) {
        location.href = "login.html";
        return;
    }

    await loadAssignment();
    await loadResponses();
});

/* ---------------------------
   Assignment取得
----------------------------*/
let assignmentData = null;

async function loadAssignment() {

    const snap = await getDoc(doc(db, "assignments", assignmentId));

    if (!snap.exists()) {
        container.innerHTML = "Assignment not found";
        return;
    }

    assignmentData = snap.data();
}

/* ---------------------------
   Responses取得（ここでエラー出てる可能性高い）
----------------------------*/
async function loadResponses() {

    try {

        const q = query(
            collection(db, "assignmentResponses"),
            where("assignmentId", "==", assignmentId)
        );

        const snap = await getDocs(q);

        const responses = [];

        snap.forEach(docSnap => {
            responses.push({
                id: docSnap.id,
                ...docSnap.data()
            });
        });

        render(responses);

    } catch (err) {
        console.error("Firestore error:", err);
        container.innerHTML = "Permission error or no access";
    }
}

/* ---------------------------
   UI表示
----------------------------*/
function render(responses) {

    let html = "<h2>Responses</h2>";

    responses.forEach(r => {

        html += `
            <div class="card">
                <b>${r.userName || r.userId}</b><br/>
                <pre>${JSON.stringify(r.answers, null, 2)}</pre>
            </div>
        `;
    });

    container.innerHTML = html;
}

</script>

</body>
</html>
