<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment Map | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f3f3;
}

header{
    background:#111;
    color:white;
    padding:15px 20px;
    font-weight:bold;
}

/* CONTROL BAR */
.control-bar{
    display:flex;
    gap:10px;
    padding:10px 20px;
    flex-wrap:wrap;
    align-items:center;
}

select, button{
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:14px;
}

button{
    background:#111;
    color:white;
    cursor:pointer;
}

/* GRID */
#gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    transition:0.2s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-3px);
}

/* MEDIA */
.card img,
.card video{
    width:100%;
    max-height:260px;
    object-fit:contain;
    background:#111;
    display:block;
}

/* INFO */
.info{
    padding:15px;
}

.title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:8px;
}

.meta{
    font-size:13px;
    color:#666;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    overflow:auto;
}

.modal-content{
    background:white;
    width:95%;
    max-width:1200px;
    margin:20px auto;
    padding:20px;
    border-radius:12px;
}

#close{
    float:right;
    font-size:32px;
    cursor:pointer;
}

.video{
    width:100%;
    margin-top:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
    ATHLETIC CLOUD - Assignments Filter
</header>

<!-- FILTER UI -->
<div class="control-bar">

    <select id="personnelFilter">
        <option value="">Personnel (All)</option>
    </select>

    <select id="numberingFilter">
        <option value="">Numbering (All)</option>
    </select>

    <select id="playTypeFilter">
        <option value="">Play Type (All)</option>
    </select>

    <button id="resetBtn">Reset</button>

</div>

<div id="gallery">Loading...</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span id="close">&times;</span>
        <img id="modalImage">
        <div id="modalInfo"></div>
        <div id="modalVideo"></div>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    query,
    where
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const params = new URLSearchParams(location.search);
const assignmentId = params.get("id");

let responses = [];
let filtered = [];

/* AUTH */
onAuthStateChanged(auth, async (user) => {
    if(!user){
        location.href = "login.html";
        return;
    }
    await load();
});

/* LOAD */
async function load(){

    const q = query(
        collection(db, "assignmentResponses"),
        where("assignmentId", "==", assignmentId)
    );

    const snap = await getDocs(q);

    responses = [];

    snap.forEach(d => {
        responses.push({
            id: d.id,
            ...d.data()
        });
    });

    filtered = [...responses];

    buildFilters();
    render();
}

/* =========================
   FILTER OPTIONS BUILD
========================= */
function buildFilters(){

    const personnelSet = new Set();
    const numberingSet = new Set();
    const playTypeSet = new Set();

    responses.forEach(r => {

        const a = r.answers || {};

        // 例：index固定想定（必要ならここ後で柔軟化できる）
        if(a[0]) personnelSet.add(a[0]);
        if(a[1]) numberingSet.add(a[1]);
        if(a[2]) playTypeSet.add(a[2]);
    });

    fillSelect("personnelFilter", personnelSet);
    fillSelect("numberingFilter", numberingSet);
    fillSelect("playTypeFilter", playTypeSet);
}

function fillSelect(id, set){

    const el = document.getElementById(id);

    set.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        el.appendChild(opt);
    });
}

/* =========================
   FILTER ENGINE (AND条件)
========================= */
function applyFilter(){

    const p = document.getElementById("personnelFilter").value;
    const n = document.getElementById("numberingFilter").value;
    const t = document.getElementById("playTypeFilter").value;

    filtered = responses.filter(r => {

        const a = r.answers || {};

        const personnel = a[0];
        const numbering = a[1];
        const playType = a[2];

        return (
            (!p || personnel === p) &&
            (!n || numbering === n) &&
            (!t || playType === t)
        );
    });

    render();
}

/* =========================
   MEDIA LOGIC
========================= */
function getTopMedia(r){

    let image = null;
    let video = null;

    for(const k in r.answers){

        const v = r.answers[k];

        if(!image && typeof v === "string" && v.includes("http") &&
           (v.includes("jpg") || v.includes("png") || v.includes("image"))){
            image = v;
        }

        if(!video && typeof v === "string" && v.includes("video")){
            video = v;
        }
    }

    if(image) return {type:"image", url:image};
    if(video) return {type:"video", url:video};

    return {type:"none", url:"https://via.placeholder.com/600x400?text=No+Image"};
}

/* TITLE */
function getTitle(r){
    return r.userName || "Untitled";
}

/* RENDER */
function render(){

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    filtered.forEach(r => {

        const media = getTopMedia(r);

        let mediaHTML = "";

        if(media.type === "image"){
            mediaHTML = `<img src="${media.url}">`;
        } else if(media.type === "video"){
            mediaHTML = `<video src="${media.url}" muted></video>`;
        } else {
            mediaHTML = `<img src="${media.url}">`;
        }

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            ${mediaHTML}
            <div class="info">
                <div class="title">${getTitle(r)}</div>
                <div class="meta">
                    ${new Date(r.createdAt?.seconds*1000 || Date.now()).toLocaleString()}
                </div>
            </div>
        `;

        card.onclick = () => openModal(r);

        gallery.appendChild(card);
    });
}

/* MODAL */
function openModal(r){

    const modal = document.getElementById("modal");
    const img = document.getElementById("modalImage");
    const info = document.getElementById("modalInfo");

    const media = getTopMedia(r);
    img.src = media.type === "image" ? media.url : "";

    let html = `<h2>${getTitle(r)}</h2>`;

    const labels = ["Personnel", "Numbering", "Play Type"];

    Object.keys(r.answers || {}).forEach((k, i) => {

        html += `
            <p>
                <b>${labels[i] || ("Q" + k)}:</b><br>
                ${r.answers[k]}
            </p>
        `;
    });

    info.innerHTML = html;

    modal.style.display = "block";
}

/* EVENTS */
document.getElementById("close").onclick = () => {
    document.getElementById("modal").style.display = "none";
};

window.onclick = (e) => {
    if(e.target.id === "modal"){
        document.getElementById("modal").style.display = "none";
    }
};

document.getElementById("personnelFilter").addEventListener("change", applyFilter);
document.getElementById("numberingFilter").addEventListener("change", applyFilter);
document.getElementById("playTypeFilter").addEventListener("change", applyFilter);

document.getElementById("resetBtn").onclick = () => {
    document.getElementById("personnelFilter").value = "";
    document.getElementById("numberingFilter").value = "";
    document.getElementById("playTypeFilter").value = "";
    filtered = [...responses];
    render();
};

</script>

</body>
</html>
