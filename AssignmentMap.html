<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment Map | Athletic Cloud</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f3f3f3;
}

header{
    background:#111;
    color:white;
    padding:15px 20px;
    font-weight:bold;
}

/* CONTROL */
.control-bar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:10px 20px;
    align-items:center;
}

select,input,button{
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:14px;
}

button{
    background:#111;
    color:white;
    cursor:pointer;
}

/* GRID */
#gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    cursor:pointer;
}

.card img,
.card video{
    width:100%;
    max-height:260px;
    object-fit:contain;
    background:#111;
}

/* INFO */
.info{padding:15px}
.title{font-size:18px;font-weight:bold}
.meta{font-size:13px;color:#666;margin-top:5px}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    overflow:auto;
}

.modal-content{
    background:white;
    width:95%;
    max-width:1100px;
    margin:20px auto;
    padding:20px;
    border-radius:12px;
}

#close{float:right;font-size:30px;cursor:pointer}

.video{
    width:100%;
    margin-top:15px;
}
</style>
</head>

<body>

<header>ATHLETIC CLOUD - SEARCH ENGINE</header>

<!-- CONTROL BAR -->
<div class="control-bar">

    <input id="searchInput" placeholder="keyword search...">

    <select id="sortSelect">
        <option value="desc">Newest</option>
        <option value="asc">Oldest</option>
    </select>

    <div id="dynamicFilters"></div>

    <button id="resetBtn">Reset</button>
</div>

<div id="gallery">Loading...</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span id="close">&times;</span>
        <img id="modalImage">
        <div id="modalInfo"></div>
        <div id="modalVideo"></div>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getFirestore,
    collection,
    getDocs,
    query,
    where
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const app = initializeApp({
    apiKey: "AIzaSyBzAHkf9LIYgCxx9sV5WvUqaxwmIWnLc8Q",
    authDomain: "athletic-cloud-33538.firebaseapp.com",
    projectId: "athletic-cloud-33538"
});

const db = getFirestore(app);
const auth = getAuth(app);

const params = new URLSearchParams(location.search);
const assignmentId = params.get("id");

let responses = [];
let filtered = [];
let filterSchema = {}; // ← フォーム構造

/* AUTH */
onAuthStateChanged(auth, async (user) => {
    if(!user){
        location.href = "login.html";
        return;
    }
    await load();
});

/* LOAD */
async function load(){

    const q = query(
        collection(db,"assignmentResponses"),
        where("assignmentId","==",assignmentId)
    );

    const snap = await getDocs(q);

    responses = snap.docs.map(d => d.data());
    filtered = [...responses];

    buildSchema();
    buildFilters();
    applyAll();
}

/* =========================
   動的スキーマ生成
========================= */
function buildSchema(){

    const sample = responses[0]?.answers || {};

    filterSchema = {};

    Object.keys(sample).forEach(k => {
        filterSchema[k] = new Set();
    });

    responses.forEach(r => {
        Object.keys(r.answers || {}).forEach(k => {
            filterSchema[k].add(r.answers[k]);
        });
    });
}

/* =========================
   フィルターUI生成
========================= */
function buildFilters(){

    const container = document.getElementById("dynamicFilters");
    container.innerHTML = "";

    Object.keys(filterSchema).forEach(key => {

        const select = document.createElement("select");
        select.dataset.key = key;

        select.innerHTML = `<option value="">${key} (all)</option>`;

        filterSchema[key].forEach(v => {
            const opt = document.createElement("option");
            opt.value = v;
            opt.textContent = v;
            select.appendChild(opt);
        });

        select.addEventListener("change", applyAll);

        container.appendChild(select);
    });
}

/* =========================
   キーワード + フィルター + sort
========================= */
function applyAll(){

    const keyword = document.getElementById("searchInput").value.toLowerCase();

    const selects = document.querySelectorAll("#dynamicFilters select");

    const filters = {};
    selects.forEach(s => {
        if(s.value) filters[s.dataset.key] = s.value;
    });

    filtered = responses.filter(r => {

        const ans = r.answers || {};

        // フィルター一致
        for(const k in filters){
            if(ans[k] != filters[k]) return false;
        }

        // キーワード検索
        const text = JSON.stringify(ans).toLowerCase();
        if(keyword && !text.includes(keyword)) return false;

        return true;
    });

    sortAndRender();
}

/* SORT */
function sortAndRender(){

    const mode = document.getElementById("sortSelect").value;

    filtered.sort((a,b)=>{
        const ta = a.createdAt?.seconds || 0;
        const tb = b.createdAt?.seconds || 0;
        return mode === "asc" ? ta - tb : tb - ta;
    });

    render();
}

/* MEDIA */
function getMedia(r){

    for(const k in r.answers){
        const v = r.answers[k];

        if(typeof v === "string" && v.includes("cloudinary")){
            if(v.includes("video")) return {type:"video", url:v};
            if(v.includes("image") || v.match(/\.(jpg|png|jpeg)/)) return {type:"image", url:v};
        }
    }

    return {type:"none", url:"https://via.placeholder.com/600x400?text=No+Image"};
}

/* TITLE */
function getTitle(r){
    return Object.values(r.answers || {})[0] || "Untitled";
}

/* RENDER */
function render(){

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    filtered.forEach(r => {

        const media = getMedia(r);

        let mediaHTML =
            media.type === "video"
            ? `<video src="${media.url}" muted></video>`
            : `<img src="${media.url}">`;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            ${mediaHTML}
            <div class="info">
                <div class="title">${getTitle(r)}</div>
                <div class="meta">
                    ${new Date(r.createdAt?.seconds*1000 || Date.now()).toLocaleString()}
                </div>
            </div>
        `;

        card.onclick = () => openModal(r);

        gallery.appendChild(card);
    });
}

/* MODAL */
function openModal(r){

    const modal = document.getElementById("modal");
    const img = document.getElementById("modalImage");
    const info = document.getElementById("modalInfo");

    const media = getMedia(r);
    img.src = media.type === "image" ? media.url : "";

    let html = `<h2>${getTitle(r)}</h2>`;

    for(const k in r.answers){
        html += `
            <p>
                <b>${k}:</b><br>
                ${r.answers[k]}
            </p>
        `;
    }

    info.innerHTML = html;

    modal.style.display = "block";
}

/* EVENTS */
document.getElementById("searchInput").addEventListener("input", applyAll);
document.getElementById("sortSelect").addEventListener("change", sortAndRender);

document.getElementById("close").onclick = () =>
    document.getElementById("modal").style.display = "none";

window.onclick = e =>
    e.target.id === "modal" && (document.getElementById("modal").style.display="none");

</script>

</body>
</html>
